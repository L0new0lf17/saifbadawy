<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>40 Ideas — Visual Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07080e;--s1:#0f1018;--s2:#161820;--border:rgba(255,255,255,0.07);--borderB:rgba(255,255,255,0.14);--accent:#E8820C;--accent2:#F5A623;--white:#f0ede8;--muted:rgba(240,237,232,0.55);--bebas:'Bebas Neue',sans-serif;--mono:'JetBrains Mono',monospace;--sans:'DM Sans',sans-serif}
html,body{background:var(--bg);color:var(--white);font-family:var(--sans);min-height:100vh}
nav{position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:.8rem 2rem;background:rgba(7,8,14,0.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
.logo{font-family:var(--bebas);font-size:1.2rem;letter-spacing:.2em;display:flex;align-items:center;gap:.5rem}
.logoDot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.navR{font-family:var(--mono);font-size:.5rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.page{max-width:1280px;margin:0 auto;padding:2.5rem 2rem 6rem}
.hdr{margin-bottom:2rem}
.hdrEye{display:flex;align-items:center;gap:.6rem;margin-bottom:.4rem}
.hdrLine{width:28px;height:1px;background:rgba(232,130,12,.4)}
.hdrTag{font-family:var(--mono);font-size:.5rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent)}
.hdrTitle{font-family:var(--bebas);font-size:2.8rem;letter-spacing:.04em;line-height:.95;margin-bottom:.5rem}
.hdrSub{font-family:var(--mono);font-size:.55rem;letter-spacing:.1em;color:var(--muted)}
.filters{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:2rem}
.filt{font-family:var(--mono);font-size:.48rem;letter-spacing:.14em;text-transform:uppercase;padding:.35rem .9rem;border:1px solid var(--border);color:var(--muted);background:none;cursor:pointer;transition:all .15s}
.filt:hover,.filt.on{border-color:rgba(232,130,12,.5);color:var(--accent);background:rgba(232,130,12,.05)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.card{background:var(--s1);border:1px solid var(--border);cursor:pointer;transition:border-color .2s,transform .15s;overflow:hidden}
.card:hover{border-color:rgba(232,130,12,.35);transform:translateY(-2px)}
.prev{width:100%;height:130px;overflow:hidden;position:relative;background:#04050a}
.card-foot{padding:10px 12px 12px}
.card-num{font-family:var(--mono);font-size:.42rem;letter-spacing:.15em;color:var(--accent);margin-bottom:3px}
.card-title{font-family:var(--bebas);font-size:1rem;letter-spacing:.05em;line-height:1.1;margin-bottom:3px}
.card-sub{font-family:var(--mono);font-size:.42rem;letter-spacing:.08em;color:var(--muted);line-height:1.4}
.catpill{display:inline-block;font-family:var(--mono);font-size:.38rem;letter-spacing:.12em;text-transform:uppercase;padding:.15rem .5rem;margin-bottom:5px}
.cp-wow{background:rgba(232,130,12,.12);color:var(--accent);border:1px solid rgba(232,130,12,.25)}
.cp-vis{background:rgba(96,165,250,.1);color:#60a5fa;border:1px solid rgba(96,165,250,.2)}
.cp-story{background:rgba(196,181,253,.1);color:#c4b5fd;border:1px solid rgba(196,181,253,.2)}
.cp-tool{background:rgba(110,231,183,.1);color:#6ee7b7;border:1px solid rgba(110,231,183,.2)}
.cp-egg{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}
/* MODAL */
#modal{position:fixed;inset:0;z-index:500;background:rgba(4,5,10,.92);backdrop-filter:blur(16px);display:none;align-items:center;justify-content:center;padding:2rem}
#modal.open{display:flex}
#mbox{background:var(--s1);border:1px solid rgba(232,130,12,.25);width:100%;max-width:820px;max-height:90vh;overflow-y:auto;position:relative}
#mbox .mtop{background:rgba(232,130,12,.04);border-bottom:1px solid rgba(232,130,12,.14);padding:.7rem 1.2rem;display:flex;align-items:center;justify-content:space-between}
#mbox .mtop-l{font-family:var(--mono);font-size:.5rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent)}
#mbox .mclose{font-family:var(--mono);font-size:.55rem;letter-spacing:.1em;background:none;border:1px solid var(--border);color:var(--muted);padding:.3rem .7rem;cursor:pointer;transition:color .2s,border-color .2s}
#mbox .mclose:hover{color:var(--accent);border-color:rgba(232,130,12,.4)}
#mscene{width:100%;min-height:380px;background:#04050a;position:relative;overflow:hidden}
#minfo{padding:1.4rem 1.6rem 1.6rem}
#minfo h2{font-family:var(--bebas);font-size:1.8rem;letter-spacing:.06em;margin-bottom:.5rem}
#minfo p{font-size:.88rem;line-height:1.8;color:var(--white);margin-bottom:1.2rem}
.mbuild{font-family:var(--bebas);font-size:.9rem;letter-spacing:.15em;padding:.7rem 1.8rem;background:var(--accent);color:#07080e;border:none;cursor:pointer;transition:background .2s}
.mbuild:hover{background:var(--accent2)}
</style>
</head>
<body>
<nav><div class="logo"><div class="logoDot"></div>SAIF BADAWY</div><div class="navR">40 Ideas Visual Preview</div></nav>
<div class="page">
<div class="hdr">
  <div class="hdrEye"><div class="hdrLine"></div><span class="hdrTag">Proposals</span></div>
  <div class="hdrTitle">40 Ideas.<br>See Before You Build.</div>
  <div class="hdrSub">Click any card to see a full interactive preview · then hit "Build This" to implement</div>
</div>
<div class="filters">
  <button class="filt on" onclick="filt('all',this)">All 40</button>
  <button class="filt" onclick="filt('wow',this)">First impression</button>
  <button class="filt" onclick="filt('vis',this)">Visualisations</button>
  <button class="filt" onclick="filt('story',this)">Storytelling</button>
  <button class="filt" onclick="filt('tool',this)">Recruiter tools</button>
  <button class="filt" onclick="filt('egg',this)">Easter eggs</button>
</div>
<div class="grid" id="grid"></div>
</div>

<div id="modal" onclick="if(event.target===this)closeModal()">
  <div id="mbox">
    <div class="mtop"><span class="mtop-l" id="mtopL">PREVIEW</span><button class="mclose" onclick="closeModal()">CLOSE ✕</button></div>
    <div id="mscene"></div>
    <div id="minfo">
      <h2 id="mtitle"></h2>
      <p id="mdesc"></p>
      <button class="mbuild" id="mbuild">BUILD THIS ON THE WEBSITE</button>
    </div>
  </div>
</div>

<script>
const IDEAS=[

function filt(cat,el){
  document.querySelectorAll('.filt').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  document.querySelectorAll('.card').forEach(c=>{
    c.style.display=(cat==='all'||c.dataset.cat===cat)?'':'none';
  });
}

function buildGrid(){
  const g=document.getElementById('grid');
  IDEAS.forEach(id=>{
    const d=document.createElement('div');
    d.className='card'; d.dataset.cat=id.cat;
    d.onclick=()=>openModal(id.n);
    d.innerHTML=`<div class="prev" id="p${id.n}"></div>
    <div class="card-foot">
      <div><span class="catpill ${id.pill}">${id.label}</span></div>
      <div class="card-num">${String(id.n).padStart(2,'0')}</div>
      <div class="card-title">${id.title}</div>
      <div class="card-sub">${id.sub}</div>
    </div>`;
    g.appendChild(d);
  });
}

buildGrid();
setTimeout(initPreviews,200);

/* ── MODAL ── */
let modalRaf=null;
function openModal(n){
  const idea=IDEAS.find(i=>i.n===n);
  document.getElementById('mtopL').textContent=`IDEA ${String(n).padStart(2,'0')} · ${idea.label.toUpperCase()}`;
  document.getElementById('mtitle').textContent=idea.title;
  document.getElementById('mdesc').textContent=idea.desc;
  document.getElementById('mbuild').onclick=()=>{
    if(window.sendPrompt) window.sendPrompt(`Build idea #${n}: ${idea.title} on my portfolio website`);
  };
  const sc=document.getElementById('mscene');
  sc.innerHTML='';
  if(modalRaf){cancelAnimationFrame(modalRaf);modalRaf=null;}
  buildModalScene(n,sc);
  document.getElementById('modal').classList.add('open');
}
function closeModal(){
  document.getElementById('modal').classList.remove('open');
  if(modalRaf){cancelAnimationFrame(modalRaf);modalRaf=null;}
}
</script>
<script>
/* ══════════════════════════════════════════
   THUMBNAIL PREVIEWS
══════════════════════════════════════════ */
function initPreviews(){
  IDEAS.forEach(id=>{ try{ drawThumb(id.n); }catch(e){} });
}

function css(el,s){ Object.assign(el.style,s); return el; }
function mk(tag,s,html){ const e=document.createElement(tag); if(s)css(e,s); if(html)e.innerHTML=html; return e; }
function mono(txt,col,sz){ return mk('div',{fontFamily:"'JetBrains Mono',monospace",fontSize:sz||'9px',color:col||'rgba(240,237,232,0.6)',letterSpacing:'.1em'}); }

function drawThumb(n){
  const p=document.getElementById('p'+n);
  if(!p)return;
  p.innerHTML='';
  const W=p.offsetWidth||220, H=130;

  /* ─ 1: Boot screen ─ */
  if(n===1){
    css(p,{background:'#02030a',display:'flex',flexDirection:'column',justifyContent:'center',padding:'14px 16px',gap:'5px'});
    const lines=['> INITIALISING SAIF BADAWY PORTFOLIO','> HERO MODULE............. ✓','> EXPERIENCE DATA......... ✓','> SKILLS ENGINE........... ✓','> PROJECTS RENDER......... ✓','> LAUNCHING...'];
    lines.forEach((l,i)=>{
      const d=mk('div',{fontFamily:"'JetBrains Mono',monospace",fontSize:'9px',color:i<lines.length-1?'#6ee7b7':'#E8820C',letterSpacing:'.05em',opacity:'0',transition:'opacity .3s'});
      d.textContent=l; p.appendChild(d);
      setTimeout(()=>d.style.opacity='1',i*280+300);
    });
  }

  /* ─ 2: Mode toggle ─ */
  if(n===2){
    css(p,{display:'flex',flexDirection:'column',gap:'6px',padding:'10px',background:'#02030a'});
    const mk2=(label,col,items)=>{
      const w=mk('div',{border:'1px solid '+(col||'rgba(255,255,255,0.1)'),background:'rgba(255,255,255,0.02)',padding:'5px 8px'});
      const t=mk('div',{fontFamily:"'JetBrains Mono',monospace",fontSize:'7px',color:col||'rgba(240,237,232,0.4)',letterSpacing:'.15em',marginBottom:'5px'});
      t.textContent=label; w.appendChild(t);
      const row=mk('div',{display:'flex',gap:'6px'});
      items.forEach(i=>{ const b=mk('div',{fontFamily:"'JetBrains Mono',monospace",fontSize:'7px',padding:'2px 6px',border:'1px solid rgba(255,255,255,0.12)',color:'rgba(240,237,232,0.6)'}); b.textContent=i; row.appendChild(b); });
      w.appendChild(row); return w;
    };
    p.appendChild(mk2('RECRUITER MODE','#6ee7b7',['CV','HIRE','CONTACT']));
    p.appendChild(mk2('EXPLORER MODE','#E8820C',['ABOUT','EXPERIENCE','SKILLS','PROJECTS','PLAN','CONTACT']));
  }

  /* ─ 3: Cursor trail ─ */
  if(n===3){
    const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
    css(cv,{display:'block'}); p.appendChild(cv);
    const ctx=cv.getContext('2d');
    let t=0,trail=[];
    (function loop(){
      ctx.clearRect(0,0,W,H);
      ctx.fillStyle='#02030a'; ctx.fillRect(0,0,W,H);
      t+=0.04;
      const mx=W/2+Math.cos(t)*70, my=H/2+Math.sin(t*0.7)*40;
      trail.push({x:mx,y:my,a:1});
      if(trail.length>18)trail.shift();
      trail.forEach((pt,i)=>{
        const r=2.5*(i/trail.length);
        ctx.beginPath(); ctx.arc(pt.x,pt.y,r,0,Math.PI*2);
        ctx.fillStyle=`rgba(96,165,250,${(i/trail.length)*0.7})`; ctx.fill();
      });
      ctx.beginPath(); ctx.arc(mx,my,4,0,Math.PI*2);
      ctx.fillStyle='#E8820C'; ctx.shadowColor='#E8820C'; ctx.shadowBlur=8; ctx.fill(); ctx.shadowBlur=0;
      requestAnimationFrame(loop);
    })();
  }

  /* ─ 4: Magnetic button ─ */
  if(n===4){
    css(p,{display:'flex',alignItems:'center',justifyContent:'center',background:'#02030a',flexDirection:'column',gap:'10px'});
    const btn=mk('div',{fontFamily:"'Bebas Neue',sans-serif",fontSize:'1rem',letterSpacing:'.15em',padding:'10px 28px',background:'#E8820C',color:'#07080e',cursor:'pointer',transition:'transform .15s'});
    btn.textContent='HIRE ME';
    p.appendChild(btn);
    const lbl=mk('div',{fontFamily:"'JetBrains Mono',monospace",fontSize:'8px',color:'rgba(240,237,232,0.4)',letterSpacing:'.12em'});

          const phi=(90-lat)*Math.PI/180, theta=(lng+t*20)*Math.PI/180;
          const x3=R*Math.sin(phi)*Math.cos(theta), y3=R*Math.cos(phi), z3=R*Math.sin(phi)*Math.sin(theta);
          if(z3>-5){ ctx.beginPath(); ctx.arc(cx+x3,cy-y3,0.8,0,Math.PI*2); ctx.fillStyle=`rgba(96,165,250,${0.2+(z3/R)*0.3})`; ctx.fill(); }

  /* ─ 10: P&ID ─ */
  if(n===10){

    p.innerHTML=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
      <line x1="30" y1="65" x2="80" y2="65" stroke="#60a5fa" stroke-width="1.5"/>

      <line x1="110" y1="65" x2="150" y2="65" stroke="#60a5fa" stroke-width="1.5"/>
      <circle cx="158" cy="65" r="14" fill="none" stroke="#6ee7b7" stroke-width="1.2"/>
      <text x="158" y="69" font-family="JetBrains Mono" font-size="6" fill="#6ee7b7" text-anchor="middle">WOOD</text>
      <line x1="172" y1="65" x2="205" y2="65" stroke="#60a5fa" stroke-width="1.5"/>

  if(n===12){

      ctx.fillStyle='#02030a'; ctx.fillRect(0,0,W,H);
      const n=16, amp=28, ys=H/2;
      for(let i=0;i<=n;i++){
        const x=(i/n)*W, phase=t+(i/n)*Math.PI*4;

        if(i>0){
          ctx.beginPath(); ctx.moveTo(((i-1)/n)*W, ys+Math.sin(t+((i-1)/n)*Math.PI*4)*amp);
          ctx.lineTo(x,y1); ctx.strokeStyle='#E8820C'; ctx.lineWidth=2; ctx.stroke();
          ctx.beginPath(); ctx.moveTo(((i-1)/n)*W, ys-Math.sin(t+((i-1)/n)*Math.PI*4)*amp);
          ctx.lineTo(x,y2); ctx.strokeStyle='#60a5fa'; ctx.lineWidth=2; ctx.stroke();
        }
        if(i%2===0){
          ctx.beginPath(); ctx.moveTo(x,y1); ctx.lineTo(x,y2);

          ctx.beginPath(); ctx.arc(x,y1,2.5,0,Math.PI*2); ctx.fillStyle='#E8820C'; ctx.fill();

  /* ─ 15: Radar hover ─ */
  if(n===15){
    const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
    css(cv,{display:'block'}); p.appendChild(cv);

    (function loop(){
      ctx.fillStyle='#02030a'; ctx.fillRect(0,0,W,H);
      hov=(hov+0.02)%axes;
      for(let i=0;i<axes;i++){
        const a=(i/axes)*Math.PI*2-Math.PI/2;
        const glow=Math.abs(Math.sin((hov-i)*Math.PI/2));
        ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+Math.cos(a)*R,cy+Math.sin(a)*R);
        ctx.strokeStyle=`rgba(232,130,12,${0.2+glow*0.6})`; ctx.lineWidth=1+glow; ctx.stroke();
      }
      ctx.beginPath();
      for(let i=0;i<axes;i++){
        const a=(i/axes)*Math.PI*2-Math.PI/2;
        const x=cx+Math.cos(a)*R*vals[i], y=cy+Math.sin(a)*R*vals[i];
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.closePath(); ctx.fillStyle='rgba(232,130,12,0.15)'; ctx.fill();
      ctx.strokeStyle='#E8820C'; ctx.lineWidth=1.5; ctx.stroke();
      const pill=mk('div'); // draw label on left
      ctx.font="8px 'JetBrains Mono',monospace"; ctx.fillStyle='rgba(240,237,232,0.5)';

    table.appendChild(yrow);

  /* ─ 17: Heartbeat ─ */
  if(n===17){
    const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
    css(cv,{display:'block'}); p.appendChild(cv);
    const ctx=cv.getContext('2d'); let offset=0;
    function ekg(x){ const t=x*0.18; return Math.exp(-Math.pow((t%6.28)-3.14,2)*0.8)*Math.sin((t%6.28)*2)*60; }
    (function loop(){
      ctx.fillStyle='rgba(2,3,10,0.15)'; ctx.fillRect(0,0,W,H);
      ctx.beginPath();
      for(let x=0;x<W;x++){
        const y=H/2-ekg(x+offset);
        x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.strokeStyle='#6ee7b7'; ctx.lineWidth=1.5;
      ctx.shadowColor='#6ee7b7'; ctx.shadowBlur=4; ctx.stroke(); ctx.shadowBlur=0;
      ctx.font="8px 'JetBrains Mono',monospace"; ctx.fillStyle='rgba(110,231,183,0.6)';
      ctx.fillText('● LIVE',W-44,14);
      offset+=2; requestAnimationFrame(loop);
    })();
  }

  /* ─ 18: Schematic transition ─ */
  if(n===18){
    const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
    css(cv,{display:'block'}); p.appendChild(cv);
    const ctx=cv.getContext('2d'); let prog=0,dir=1;
    (function loop(){
      ctx.fillStyle='#02030a'; ctx.fillRect(0,0,W,H);
      prog+=dir*0.008; if(prog>=1||prog<=0)dir*=-1;
      const drawLen=prog*W*4;
      ctx.strokeStyle='rgba(96,165,250,0.5)'; ctx.lineWidth=0.8; ctx.setLineDash([3,4]);
      const lines=[[0,30,W,30],[0,65,W,65],[0,100,W,100],[40,0,40,H],[W/2,0,W/2,H],[W-40,0,W-40,H]];
      lines.forEach(([x1,y1,x2,y2])=>{
        const len=Math.hypot(x2-x1,y2-y1), drawn=Math.min(drawLen,len);
        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x1+(x2-x1)*(drawn/len),y1+(y2-y1)*(drawn/len)); ctx.stroke();
      });
      ctx.setLineDash([]);
      ctx.font="7px 'JetBrains Mono',monospace"; ctx.fillStyle='rgba(96,165,250,0.5)';
      ctx.fillText('SECTION TRANSITION',8,H-10);
      requestAnimationFrame(loop);
    })();
  }
}

  }

  /* ─ 40: Dark/light dual personality ─ */
  if(n===40){

<script>
/* ══════════════════════════════════════════

function buildModalScene(n, sc){

  else if(n===6){

    d.textContent='SAIF BADAWY'; sc.appendChild(d);
    const chars='!@#$%^&*ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';

  else if(n===9){
    const cv=document.createElement('canvas'); cv.width=W; cv.height=H; cv.style.display='block'; sc.appendChild(cv);
    const ctx=cv.getContext('2d'); let t=0;

    const pins=[{lat:25,lng:55,label:'Al Habtoor · Dubai 2015',col:'#fbbf24'},{lat:57,lng:-3,label:'Wood PLC · Aberdeen 2022',col:'#6ee7b7'},{lat:61,lng:2,label:'ExxonMobil · North Sea 2021',col:'#60a5fa'},{lat:51.5,lng:-.1,label:'Freelance · London 2025',col:'#E8820C'}];
    function loop(){
      ctx.fillStyle='#04050a'; ctx.fillRect(0,0,W,H);
      for(let lat=-80;lat<=80;lat+=15){ for(let lng=0;lng<360;lng+=10){
        const phi=(90-lat)*Math.PI/180, theta=(lng+t*15)*Math.PI/180;
        const x3=R*Math.sin(phi)*Math.cos(theta), y3=R*Math.cos(phi), z3=R*Math.sin(phi)*Math.sin(theta);

          ctx.fillStyle=pin.col; ctx.shadowColor=pin.col; ctx.shadowBlur=10; ctx.fill(); ctx.shadowBlur=0;

  else if(n===13){

    after.style.clipPath='inset(0 0 0 45%)';
    handle.style.left='45%';
    sc.appendChild(before); sc.appendChild(after); sc.appendChild(handle);
    let drag=false;
    sc.addEventListener('mousedown',()=>drag=true);
    window.addEventListener('mouseup',()=>drag=false);
    sc.addEventListener('mousemove',e=>{ if(!drag)return; const r=sc.getBoundingClientRect(); const pct=Math.max(10,Math.min(90,((e.clientX-r.left)/r.width)*100)); handle.style.left=pct+'%'; after.style.clipPath=`inset(0 0 0 ${pct}%)`; });

  else if(n===22){

      {pre:'Successfully managed a ',val:'£47M capital budget',post:' across three concurrent project sites.'},

  else if(n===32){
    Object.assign(sc.style,{background:'#04050a',padding:'40px 60px',display:'flex',flexDirection:'column',gap:'20px',justifyContent:'center'});

    const slider=document.createElement('input'); slider.type='range'; slider.min='1'; slider.max='200'; slider.value='47'; Object.assign(slider.style,{width:'100%',accentColor:'#E8820C',height:'4px'});

      particles.forEach(pt=>{ pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=0.2; pt.life-=0.015; if(pt.life<0)return;
        ctx.globalAlpha=pt.life; ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2); ctx.fillStyle=pt.col; ctx.fill(); ctx.globalAlpha=1; });
      modalRaf=requestAnimationFrame(loop);
    })();
  }

  else if(n===36){
    Object.assign(sc.style,{background:'#010308',padding:'30px 40px',fontFamily:"'JetBrains Mono',monospace",display:'flex',flexDirection:'column',gap:'0'});
    const output=div({fontSize:'12px',lineHeight:'1.8',flex:'1',overflow:'hidden'});
    const welcome=[
      {t:'SAIF BADAWY PORTFOLIO — TERMINAL MODE v1.0',c:'#E8820C'},

      'projects':[{t:'↳ 24 major projects delivered',c:'#6ee7b7'},{t:'  Total portfolio value: £200M+',c:'rgba(240,237,232,0.5)'}],

    inputRow.appendChild(prompt); inputRow.appendChild(inp); sc.appendChild(output); sc.appendChild(inputRow);
    setTimeout(()=>inp.focus(),100);

  else {

    Object.assign(sc.style,{background:'#04050a',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:'16px'});

    sc.appendChild(ico); sc.appendChild(tt); sc.appendChild(sub);
  }
