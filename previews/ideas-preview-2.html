<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>40 Next-Level Ideas — Visual Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07080e;--s1:#0f1018;--s2:#161820;--border:rgba(255,255,255,0.07);--accent:#E8820C;--accent2:#F5A623;--white:#f0ede8;--muted:rgba(240,237,232,0.55);--bebas:'Bebas Neue',sans-serif;--mono:'JetBrains Mono',monospace;--sans:'DM Sans',sans-serif}
html,body{background:var(--bg);color:var(--white);font-family:var(--sans);min-height:100vh}
nav{position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:.8rem 2rem;background:rgba(7,8,14,0.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
.logo{font-family:var(--bebas);font-size:1.2rem;letter-spacing:.2em;display:flex;align-items:center;gap:.5rem}
.logoDot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.badge{font-family:var(--mono);font-size:.48rem;letter-spacing:.18em;text-transform:uppercase;padding:.35rem .9rem;border:1px solid rgba(232,130,12,.4);color:var(--accent);background:rgba(232,130,12,.06)}
.page{max-width:1280px;margin:0 auto;padding:2.5rem 2rem 6rem}
.hdr{margin-bottom:2rem}
.hdrEye{display:flex;align-items:center;gap:.6rem;margin-bottom:.4rem}
.hdrLine{width:28px;height:1px;background:rgba(232,130,12,.4)}
.hdrTag{font-family:var(--mono);font-size:.5rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent)}
.hdrTitle{font-family:var(--bebas);font-size:2.8rem;letter-spacing:.04em;line-height:.95;margin-bottom:.5rem}
.hdrSub{font-family:var(--mono);font-size:.55rem;letter-spacing:.1em;color:var(--muted)}
.filters{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:2rem}
.filt{font-family:var(--mono);font-size:.48rem;letter-spacing:.14em;text-transform:uppercase;padding:.35rem .9rem;border:1px solid var(--border);color:var(--muted);background:none;cursor:pointer;transition:all .15s}
.filt:hover,.filt.on{border-color:rgba(232,130,12,.5);color:var(--accent);background:rgba(232,130,12,.05)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.card{background:var(--s1);border:1px solid var(--border);cursor:pointer;transition:border-color .2s,transform .15s;overflow:hidden}
.card:hover{border-color:rgba(232,130,12,.35);transform:translateY(-2px)}
.prev{width:100%;height:140px;overflow:hidden;position:relative;background:#03040a}
.card-foot{padding:10px 12px 12px}
.card-num{font-family:var(--mono);font-size:.42rem;letter-spacing:.15em;color:var(--accent);margin-bottom:3px}
.card-title{font-family:var(--bebas);font-size:1rem;letter-spacing:.05em;line-height:1.1;margin-bottom:3px}
.card-sub{font-family:var(--mono);font-size:.42rem;letter-spacing:.08em;color:var(--muted);line-height:1.4}
.pill{display:inline-block;font-family:var(--mono);font-size:.38rem;letter-spacing:.12em;text-transform:uppercase;padding:.15rem .5rem;margin-bottom:5px}
.p-ai{background:rgba(196,181,253,.1);color:#c4b5fd;border:1px solid rgba(196,181,253,.2)}
.p-sim{background:rgba(96,165,250,.1);color:#60a5fa;border:1px solid rgba(96,165,250,.2)}
.p-gen{background:rgba(232,130,12,.1);color:#E8820C;border:1px solid rgba(232,130,12,.2)}
.p-data{background:rgba(110,231,183,.1);color:#6ee7b7;border:1px solid rgba(110,231,183,.2)}
.p-immerse{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}
#modal{position:fixed;inset:0;z-index:500;background:rgba(4,5,10,.94);backdrop-filter:blur(18px);display:none;align-items:center;justify-content:center;padding:2rem}
#modal.open{display:flex}
#mbox{background:var(--s1);border:1px solid rgba(232,130,12,.25);width:100%;max-width:880px;max-height:90vh;overflow-y:auto;position:relative}
.mtop{background:rgba(232,130,12,.04);border-bottom:1px solid rgba(232,130,12,.14);padding:.7rem 1.2rem;display:flex;align-items:center;justify-content:space-between}
.mtop-l{font-family:var(--mono);font-size:.5rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent)}
.mclose{font-family:var(--mono);font-size:.55rem;letter-spacing:.1em;background:none;border:1px solid var(--border);color:var(--muted);padding:.3rem .7rem;cursor:pointer}
.mclose:hover{color:var(--accent);border-color:rgba(232,130,12,.4)}
#mscene{width:100%;min-height:400px;background:#03040a;overflow:hidden;position:relative}
#minfo{padding:1.4rem 1.6rem 1.6rem}
#minfo h2{font-family:var(--bebas);font-size:1.8rem;letter-spacing:.06em;margin-bottom:.5rem}
#minfo p{font-size:.88rem;line-height:1.8;color:var(--white);margin-bottom:1.2rem}
.mbuild{font-family:var(--bebas);font-size:.9rem;letter-spacing:.15em;padding:.7rem 1.8rem;background:var(--accent);color:#07080e;border:none;cursor:pointer;transition:background .2s}
.mbuild:hover{background:var(--accent2)}
</style>
</head>
<body>
<nav><div class="logo"><div class="logoDot"></div>SAIF BADAWY</div><div class="badge">VOL. II · 40 NEW IDEAS</div></nav>
<div class="page">
<div class="hdr">
  <div class="hdrEye"><div class="hdrLine"></div><span class="hdrTag">Next Level</span></div>
  <div class="hdrTitle">40 Ideas.<br>Never Done Before.</div>
  <div class="hdrSub">AI · Real-time Simulation · Generative Systems · Immersive Engineering · Click any card to preview</div>
</div>
<div class="filters">
  <button class="filt on" onclick="filt('all',this)">All 40</button>
  <button class="filt" onclick="filt('ai',this)">AI powered</button>
  <button class="filt" onclick="filt('sim',this)">Simulation</button>
  <button class="filt" onclick="filt('gen',this)">Generative</button>
  <button class="filt" onclick="filt('data',this)">Data viz</button>
  <button class="filt" onclick="filt('immerse',this)">Immersive</button>
</div>
<div class="grid" id="grid"></div>
</div>
<div id="modal" onclick="if(event.target===this)closeModal()">
  <div id="mbox">
    <div class="mtop"><span class="mtop-l" id="mtopL">PREVIEW</span><button class="mclose" onclick="closeModal()">CLOSE ✕</button></div>
    <div id="mscene"></div>
    <div id="minfo"><h2 id="mtitle"></h2><p id="mdesc"></p><button class="mbuild" id="mbuild">BUILD THIS ON MY WEBSITE</button></div>
  </div>
</div>
<script>
const IDEAS=[
{n:1,cat:'ai',title:'AI "Interview Me"',sub:'Visitors ask questions, Claude answers as Saif',desc:'An AI chatbot powered by the Claude API that answers recruiter questions in first person, drawing from the CV and portfolio. Ask it anything: salary expectations, technical depth, management style.',pill:'p-ai',label:'AI Powered'},
{n:2,cat:'ai',title:'JD Fit Score',sub:'AI scores any job posting vs Saif\'s profile',desc:'Paste a full job description. A local AI model scores the match 0–100%, explains which requirements are matched, which are partial, and which are gaps. With a confidence breakdown.',pill:'p-ai',label:'AI Powered'},
{n:3,cat:'ai',title:'AI Cover Letter',sub:'Generates a tailored letter on the fly',desc:'Recruiter inputs a company name and role. AI generates a personalised cover letter in Saif\'s writing style, citing specific relevant experience. Download as PDF in one click.',pill:'p-ai',label:'AI Powered'},
{n:4,cat:'ai',title:'Natural Language CV Search',sub:'Ask the CV anything in plain English',desc:'"Show me all projects over £20M" or "What safety standards has Saif worked with?" — semantic search over the entire CV and portfolio, returning structured results.',pill:'p-ai',label:'AI Powered'},
{n:5,cat:'ai',title:'AI Project Brief Generator',sub:'Input a challenge, get a structured response',desc:'Type any engineering PM challenge. The page generates a structured response using Saif\'s actual methodologies — risk register format, WBS outline, stakeholder map — in seconds.',pill:'p-ai',label:'AI Powered'},
{n:6,cat:'ai',title:'Sentiment-Driven Visuals',sub:'Page colours shift with AI-read visitor mood',desc:'Webcam (opt-in) or typing speed/pattern detects visitor engagement level. The ambient background and colour temperature subtly shift — warmer when engaged, cooler when scanning.',pill:'p-ai',label:'AI Powered'},
{n:7,cat:'ai',title:'AI-Written Case Study',sub:'Click project → AI narrates the story',desc:'Click any project card. The AI narrates the project story dynamically, choosing different angles: engineering detail, business impact, personal challenge — different every visit.',pill:'p-ai',label:'AI Powered'},
{n:8,cat:'ai',title:'Skills Gap Analyser',sub:'Find what training would make Saif perfect',desc:'Paste a JD. AI identifies the exact skills gap between the JD and Saif\'s profile and suggests what 3-month training would close it completely. Turns a rejection into a roadmap.',pill:'p-ai',label:'AI Powered'},
{n:9,cat:'sim',title:'Navier-Stokes Fluid Hero',sub:'Real CFD fluid responds to your mouse',desc:'The hero background is a real-time Navier-Stokes fluid simulation. Moving the mouse creates pressure waves, vortices and turbulence — exactly the kind of fluid Saif models in process engineering.',pill:'p-sim',label:'Simulation'},
{n:10,cat:'sim',title:'Live FEA Stress Visualiser',sub:'Apply loads — watch stress heatmap update',desc:'An interactive finite element mesh. Drag sliders to apply forces, pressures, and thermal loads. The mesh deforms and a stress heatmap updates in real time. ANSYS meets portfolio.',pill:'p-sim',label:'Simulation'},
{n:11,cat:'sim',title:'Pipe Network Flow Sim',sub:'Open valves — watch pressure & flow change',desc:'A live P&ID where you click valves to open or close them. Flow rates and pressures update dynamically, showing choking, surges, and dead-legs. A working hydraulic model.',pill:'p-sim',label:'Simulation'},
{n:12,cat:'sim',title:'Wind Turbine Simulator',sub:'Adjust wind speed — watch turbine respond',desc:'An interactive 3D wind turbine. Drag the wind speed slider and watch the blade RPM, power output and efficiency all update in real time. Connected to a live power curve model.',pill:'p-sim',label:'Simulation'},
{n:13,cat:'sim',title:'Monte Carlo Risk Engine',sub:'Thousands of project simulations live',desc:'Input project duration, cost, and risk variables. The engine runs 10,000 Monte Carlo iterations on screen, drawing the probability distribution live. P80/P90 confidence bands included.',pill:'p-sim',label:'Simulation'},
{n:14,cat:'sim',title:'Structural Load Response',sub:'Draw a structure — apply load — watch it bend',desc:'A simplified 2D structural solver. Draw columns and beams, then apply point loads or distributed forces. The structure deflects based on actual stiffness matrix calculations.',pill:'p-sim',label:'Simulation'},
{n:15,cat:'sim',title:'Particle Swarm Optimiser',sub:'Watch AI find the optimal project path',desc:'A visualisation of particle swarm optimisation solving a project scheduling problem. Hundreds of solution-particles swarm toward the global optimum in real time on canvas.',pill:'p-sim',label:'Simulation'},
{n:16,cat:'sim',title:'Offshore Platform Generator',sub:'Click to procedurally build a new platform',desc:'A procedural generator that builds unique offshore platform configurations. Every click creates a new layout — topsides, jackets, risers — using engineering constraint rules.',pill:'p-sim',label:'Simulation'},
{n:17,cat:'gen',title:'Reaction-Diffusion Skin',sub:'Turing patterns grow in the background',desc:'A real-time reaction-diffusion simulation (the Turing pattern system) grows across the site background — the same mathematics that creates animal skin patterns and chemical oscillations.',pill:'p-gen',label:'Generative'},
{n:18,cat:'gen',title:'Procedural Circuit Board',sub:'Traces route themselves algorithmically',desc:'A generative algorithm routes PCB-style circuit traces across the hero or section backgrounds. Every page load produces a unique layout following real PCB routing rules.',pill:'p-gen',label:'Generative'},
{n:19,cat:'gen',title:'L-System WBS Tree',sub:'Project breakdown structure as living fractal',desc:'Input a project type and watch an L-system fractal tree grow, each branch a work breakdown structure item. The deeper the project, the more branches. Animated, responsive, unique.',pill:'p-gen',label:'Generative'},
{n:20,cat:'gen',title:'Lorenz Attractor Career',sub:'Chaos theory maps to career decisions',desc:'A real-time 3D Lorenz attractor traces itself on canvas. Each wing of the butterfly represents a career path taken. The sensitive dependence on initial conditions mirrors every pivotal decision.',pill:'p-gen',label:'Generative'},
{n:21,cat:'gen',title:'Voronoi Stakeholder Map',sub:'Influence territories shift dynamically',desc:'Project stakeholders as Voronoi cells. Territory area = influence level. Hover a cell to see the stakeholder. Drag cells to show relationship changes. A living stakeholder management tool.',pill:'p-gen',label:'Generative'},
{n:22,cat:'gen',title:'Generative Music from CV',sub:'CV data converted to algorithmic composition',desc:'The CV data maps to musical parameters: project duration → note length, risk level → timbre, budget → pitch range. The portfolio literally plays itself as a generative piece.',pill:'p-gen',label:'Generative'},
{n:23,cat:'gen',title:'Perlin Noise Risk Terrain',sub:'Navigate a landscape of project risk',desc:'A Perlin noise terrain where elevation = risk severity, colour = risk type (safety/cost/schedule). Animated with procedural clouds. Project markers glow at their risk coordinates.',pill:'p-gen',label:'Generative'},
{n:24,cat:'gen',title:'Cloth Physics Section Header',sub:'Section titles ripple with real fabric physics',desc:'Section header banners behave as cloth — they ripple, fold, and react to mouse movement with mass-spring physics. Engineering precision applied to UI fabric.',pill:'p-gen',label:'Generative'},
{n:25,cat:'data',title:'Force-Directed Skill Graph',sub:'Skills as nodes — drag, cluster, explore',desc:'All skills and tools as force-directed graph nodes. Related skills attract each other, incompatible ones repel. Drag any node to watch the whole graph rebalance. Hover for skill depth.',pill:'p-data',label:'Data viz'},
{n:26,cat:'data',title:'Live UK Energy Grid',sub:'Real API data — Saif\'s projects highlighted',desc:'A live dashboard showing the UK\'s current energy generation mix from the National Grid API. Renewable projects Saif has worked on glow highlighted in the mix in real time.',pill:'p-data',label:'Data viz'},
{n:27,cat:'data',title:'3D Risk Cube Navigator',sub:'Navigate risk in three dimensions',desc:'A 3D WebGL cube where each axis is Probability, Impact, and Detectability. All project risks are plotted as glowing spheres. Rotate and zoom to explore the risk landscape.',pill:'p-data',label:'Data viz'},
{n:28,cat:'data',title:'Project Dependency Orbital',sub:'Work packages orbit like solar system',desc:'Project work packages orbit a central deliverable like planets around a sun. Orbital period = duration. Size = budget. Connections between orbiting packages light up on hover.',pill:'p-data',label:'Data viz'},
{n:29,cat:'data',title:'Neural Network Skill Viz',sub:'Watch a network learn project management',desc:'A live neural network visualisation showing nodes and weighted connections representing how Saif\'s skills connect and amplify each other. Watch activations pulse through the layers.',pill:'p-data',label:'Data viz'},
{n:30,cat:'data',title:'Real-Time CO₂ Atmosphere',sub:'Live Mauna Loa CO₂ data from NOAA API',desc:'A live widget showing the current atmospheric CO₂ from NOAA\'s API, with Saif\'s ESG project impact overlaid — showing the counterfactual reduction his work contributed to.',pill:'p-data',label:'Data viz'},
{n:31,cat:'immerse',title:'Raycasting Facility Walk',sub:'Walk through a 3D oil facility',desc:'A Wolfenstein-style raycasting engine renders a first-person walkthrough of a simplified offshore facility. W/A/S/D to move between sections — control room, processing deck, wellhead.',pill:'p-immerse',label:'Immersive'},
{n:32,cat:'immerse',title:'Holographic Scan Mode',sub:'Entire site enters hologram mode',desc:'Press H (or a button) to activate holographic mode: CRT scanlines, depth blur, RGB chromatic aberration on text, and a slow pan-and-scan effect. The portfolio becomes a Star Wars briefing.',pill:'p-immerse',label:'Immersive'},
{n:33,cat:'immerse',title:'LIDAR Point Cloud Site',sub:'Portfolio sections rendered as point cloud',desc:'On enter, sections "scan" in as LIDAR point clouds — thousands of coloured dots that assemble into text and images as if being surveyed in real time. An engineering survey aesthetic.',pill:'p-immerse',label:'Immersive'},
{n:34,cat:'immerse',title:'Quantum State CV',sub:'Superposition collapses on observation',desc:'Career facts exist in quantum superposition — two possible states displayed simultaneously. When you click/observe, the wavefunction collapses to reveal the definitive answer. Schrödinger\'s Portfolio.',pill:'p-immerse',label:'Immersive'},
{n:35,cat:'immerse',title:'Matrix Engineering Rain',sub:'Engineering codes fall instead of Japanese',desc:'A reimagined Matrix rain using engineering codes: P&ID numbers, API standards, project codes, cost codes — all cascading in amber instead of green. Press M to activate.',pill:'p-immerse',label:'Immersive'},
{n:36,cat:'immerse',title:'Parallax Star Field Depth',sub:'Engineering constellations in deep space',desc:'A deep-space parallax where the stars form engineering constellation patterns — PRINCE2 as Orion, P&ID as the Plough. Move the mouse to fly through the field at warp speed.',pill:'p-immerse',label:'Immersive'},
{n:37,cat:'immerse',title:'Live Recruiter Heatmap',sub:'AI simulates where eyes go on the page',desc:'A toggle that overlays an AI-generated eye-tracking heatmap showing where recruiters typically focus — warm spots on key credentials, cool areas on less-critical content. Persuasion science visible.',pill:'p-immerse',label:'Immersive'},
{n:38,cat:'immerse',title:'Wormhole Section Travel',sub:'Scroll through a wormhole between sections',desc:'Instead of standard scroll, section transitions send you through an animated hyperspace wormhole — tubes of light, spatial distortion — before arriving at the next section.',pill:'p-immerse',label:'Immersive'},
{n:39,cat:'immerse',title:'"Ghost" Visitor Cursors',sub:'See where previous visitors explored',desc:'Faint ghost cursors replay the paths of previous page visitors in real time — showing the collective browsing behaviour of all recruiters who\'ve visited. You see the crowd.',pill:'p-immerse',label:'Immersive'},
{n:40,cat:'immerse',title:'Portfolio as P&ID Navigation',sub:'The site map IS a process diagram',desc:'The entire site navigation is a live P&ID schematic. Clicking a vessel = about section. Opening a valve = navigates to skills. The portfolio architecture is literally an engineering drawing.',pill:'p-immerse',label:'Immersive'},
];

function filt(cat,el){
  document.querySelectorAll('.filt').forEach(b=>b.classList.remove('on')); el.classList.add('on');
  document.querySelectorAll('.card').forEach(c=>{ c.style.display=(cat==='all'||c.dataset.cat===cat)?'':'none'; });
}
function buildGrid(){
  const g=document.getElementById('grid');
  IDEAS.forEach(id=>{
    const d=document.createElement('div'); d.className='card'; d.dataset.cat=id.cat;
    d.onclick=()=>openModal(id.n);
    d.innerHTML=`<div class="prev" id="p${id.n}"></div><div class="card-foot"><span class="pill ${id.pill}">${id.label}</span><div class="card-num">${String(id.n).padStart(2,'0')}</div><div class="card-title">${id.title}</div><div class="card-sub">${id.sub}</div></div>`;
    g.appendChild(d);
  });
}
buildGrid();

let mRaf=null;
function openModal(n){
  const idea=IDEAS.find(i=>i.n===n);
  document.getElementById('mtopL').textContent=`IDEA ${String(n).padStart(2,'0')} · ${idea.label.toUpperCase()}`;
  document.getElementById('mtitle').textContent=idea.title;
  document.getElementById('mdesc').textContent=idea.desc;
  document.getElementById('mbuild').onclick=()=>{ if(window.sendPrompt) window.sendPrompt(`Build idea from Vol2 #${n}: ${idea.title} on my portfolio website`); };
  const sc=document.getElementById('mscene'); sc.innerHTML='';
  if(mRaf){cancelAnimationFrame(mRaf);mRaf=null;}
  buildModal(n,sc);
  document.getElementById('modal').classList.add('open');
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); if(mRaf){cancelAnimationFrame(mRaf);mRaf=null;} }

// ═══════════════════════════════════════════════
// THUMBNAIL RENDERERS
// ═══════════════════════════════════════════════
function drawThumb(n, el) {
  const c = document.createElement('canvas');
  const W = el.offsetWidth || 220, H = 140;
  c.width = W; c.height = H;
  c.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%';
  el.style.position = 'relative';
  el.appendChild(c);
  const ctx = c.getContext('2d');
  let t = 0, raf;

  const A = '#E8820C', DIM = 'rgba(232,130,12,0.18)', BG = '#03040a';

  function loop() {
    raf = requestAnimationFrame(loop);
    t += 0.016;
    ctx.fillStyle = BG; ctx.fillRect(0, 0, W, H);

    if (n===1) { // AI Interview — chat bubbles
      ctx.fillStyle='rgba(196,181,253,0.12)'; ctx.fillRect(12,15+Math.sin(t)*2,W-80,18); ctx.fillRect(W-95,42+Math.sin(t+1)*2,70,18);
      ctx.fillStyle='rgba(196,181,253,0.7)'; ctx.fillRect(12,15+Math.sin(t)*2,3,18); ctx.fillRect(W-95,42+Math.sin(t+1)*2,3,18);
      ctx.font='6px JetBrains Mono,monospace'; ctx.fillStyle='rgba(196,181,253,0.9)';
      ctx.fillText('Tell me about your PM experience',16,28+Math.sin(t)*2);
      ctx.fillText('I led 3 projects > £20M…',W-91,55+Math.sin(t+1)*2);
      // cursor blink
      if(Math.sin(t*3)>0){ctx.fillStyle=A;ctx.fillRect(16+(Math.floor(t*8)%20)*4,68,2,10);}
      ctx.fillStyle=DIM; ctx.fillRect(12,65,Math.min(W-24,(t*30)%(W-24)),2);
    }
    else if (n===2) { // JD Fit Score — animated bar
      const score = 87, prog = Math.min(1, t/2);
      ctx.fillStyle='rgba(196,181,253,0.08)'; ctx.fillRect(20,50,W-40,14);
      const grad = ctx.createLinearGradient(20,0,W-40,0);
      grad.addColorStop(0,'rgba(196,181,253,0.9)'); grad.addColorStop(1,'rgba(232,130,12,0.9)');
      ctx.fillStyle=grad; ctx.fillRect(20,50,(W-40)*prog*score/100,14);
      ctx.font='bold 28px Bebas Neue,sans-serif'; ctx.fillStyle='rgba(196,181,253,1)';
      ctx.fillText(Math.floor(prog*score)+'%',W/2-18,42);
      ctx.font='5px JetBrains Mono,monospace'; ctx.fillStyle='rgba(196,181,253,0.5)';
      ctx.fillText('JD FIT SCORE',W/2-16,80);
      // pulse ring
      const r = 8+Math.sin(t*2)*3;
      ctx.strokeStyle='rgba(196,181,253,'+(0.3+Math.sin(t*2)*0.2)+')';
      ctx.lineWidth=1; ctx.beginPath(); ctx.arc(W/2,100,r,0,Math.PI*2); ctx.stroke();
    }
    else if (n===3) { // AI Cover Letter — text streaming
      ctx.font='6px JetBrains Mono,monospace'; ctx.fillStyle='rgba(196,181,253,0.7)';
      const lines=['Dear Hiring Manager,','I am writing to express my','interest in the Senior PM role','at [Company]. My background in','infrastructure delivery…'];
      const visible = Math.floor(t*1.2);
      lines.slice(0,5).forEach((l,i)=>{
        if(i*8<visible) ctx.fillText(l,16,25+i*16);
      });
      if(Math.sin(t*4)>0&&visible<40){ctx.fillStyle=A;ctx.fillRect(16+ctx.measureText(lines[Math.min(4,Math.floor(visible/8))]).width,25+Math.min(4,Math.floor(visible/8))*16-8,1,9);}
      ctx.fillStyle='rgba(232,130,12,0.15)'; ctx.fillRect(W-36,H-24,28,12);
      ctx.font='5px JetBrains Mono,monospace'; ctx.fillStyle=A; ctx.fillText('PDF ↓',W-33,H-14);
    }
    else if (n===4) { // NL CV Search
      ctx.strokeStyle='rgba(196,181,253,0.4)'; ctx.lineWidth=1;
      ctx.strokeRect(14,18,W-28,18);
      ctx.font='6px JetBrains Mono,monospace'; ctx.fillStyle='rgba(196,181,253,0.5)';
      ctx.fillText('projects over £20M…',18,31);
      if(Math.sin(t*3)>0){ctx.fillStyle='rgba(196,181,253,0.8)';ctx.fillRect(14+ctx.measureText('projects over £20M…').width+2,21,1,11);}
      const results = ['NEOM Phase 3 · £340M','Crossrail Interface · £28M','North Sea Upgrade · £22M'];
      results.forEach((r,i)=>{
        const y = 52+i*22, fade = Math.max(0,Math.min(1,(t-0.8-i*0.3)*3));
        ctx.fillStyle=`rgba(196,181,253,${fade*0.12})`; ctx.fillRect(14,y-10,W-28,17);
        ctx.fillStyle=`rgba(196,181,253,${fade*0.85})`; ctx.fillText(r,18,y);
      });
    }
    else if (n===5) { // AI Project Brief — blocks building

function buildModal(n, sc) {
  const W=sc.offsetWidth||880, H=400;

  c.width=W; c.height=H; c.style.cssText='width:100%;height:400px;display:block';
  sc.appendChild(c);
  const ctx=c.getContext('2d');
  const A='#E8820C'; let t=0;
  const BG='#03040a';

  function frame(){
    mRaf=requestAnimationFrame(frame); t+=0.012;
    ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);

    if(n===1){ // AI Interview — full chat
      ctx.fillStyle='rgba(196,181,253,0.04)'; ctx.fillRect(0,0,W,H);
      const msgs=[{r:false,m:'What\'s your approach to managing £100M+ projects?'},{r:true,m:'I apply structured stage-gate governance. On NEOM Phase 3 I led a £340M scope — breaking it into 6-month tranches with independent cost-to-complete reviews at each gate.'},{r:false,m:'How do you handle stakeholder conflicts?'},{r:true,m:'Stakeholder mapping from day one. I identify decision-makers vs influencers, document their success criteria, and align delivery milestones to their specific KPIs.'}];
      msgs.forEach((msg,i)=>{
        const appear=Math.min(1,Math.max(0,(t-i*1.2)*2));
        if(appear<=0)return;
        const x=msg.r?W*0.35:W*0.05, bW=W*0.55, y=30+i*80;
        ctx.fillStyle=msg.r?'rgba(110,231,183,0.08)':'rgba(196,181,253,0.08)';
        ctx.fillRect(x,y,bW,60);
        ctx.fillStyle=msg.r?'rgba(110,231,183,0.5)':'rgba(196,181,253,0.5)';
        ctx.fillRect(msg.r?x:x+bW-3,y,3,60);
        ctx.font='11px DM Sans,sans-serif'; ctx.fillStyle='rgba(255,255,255,0.85)';
        const words=msg.m.split(' '); let line='',ly=y+18;
        words.forEach(w=>{if(ctx.measureText(line+w).width>bW-20){ctx.fillText(line,x+10,ly);line=w+' ';ly+=14;}else line+=w+' ';});
        ctx.fillText(line,x+10,ly);
      });
      if(Math.sin(t*3)>0){ctx.fillStyle=A;ctx.fillRect(W*0.05+6,348,2,14);}
    }
    else if(n===2){ // JD Fit score — animated breakdown
      const bars=[['Project Management',0.95],['Risk Assessment',0.88],['Stakeholder Management',0.92],['Cost Management',0.85],['ISO Standards',0.78],['Digital Tools',0.72]];
      ctx.font='bold 48px Bebas Neue,sans-serif';
      ctx.fillStyle='rgba(196,181,253,0.9)'; ctx.fillText('87%',W/2-40,H/2-40);
      ctx.font='12px JetBrains Mono,monospace'; ctx.fillStyle='rgba(196,181,253,0.5)'; ctx.fillText('JD FIT SCORE',W/2-38,H/2-10);
      bars.forEach(([name,score],i)=>{
        const y=30+i*48, prog=Math.min(score,Math.min(1,t/3)*score);
        ctx.fillStyle='rgba(196,181,253,0.07)'; ctx.fillRect(W*0.05,y,(W*0.42),18);
        const grad=ctx.createLinearGradient(W*0.05,0,W*0.47,0);
        grad.addColorStop(0,'rgba(196,181,253,0.9)'); grad.addColorStop(1,'rgba(232,130,12,0.8)');
        ctx.fillStyle=grad; ctx.fillRect(W*0.05,y,(W*0.42)*prog,18);
        ctx.font='9px JetBrains Mono,monospace'; ctx.fillStyle='rgba(255,255,255,0.75)';
        ctx.fillText(name,W*0.05,y-4);
        ctx.fillText(Math.round(prog*100)+'%',W*0.48,y+12);
      });
    }
    else if(n===9){ // Navier-Stokes — big canvas
      if(!c._p){c._p=Array.from({length:500},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3}));}
      const mx=W/2+Math.cos(t*0.7)*W*0.25, my=H/2+Math.sin(t*0.5)*H*0.2;
      c._p.forEach(p=>{
        const dx=mx-p.x,dy=my-p.y,d=Math.sqrt(dx*dx+dy*dy)+1;
        p.vx+=dx/d*0.3+Math.sin(t+p.y*0.015)*0.4; p.vy+=dy/d*0.3+Math.cos(t+p.x*0.015)*0.4;
        p.vx*=0.97; p.vy*=0.97; p.x+=p.vx; p.y+=p.vy;
        if(p.x<0)p.x=W; if(p.x>W)p.x=0; if(p.y<0)p.y=H; if(p.y>H)p.y=0;
        const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
        ctx.fillStyle=`hsla(${190+spd*25},75%,55%,0.5)`;ctx.fillRect(p.x,p.y,2,2);
      });
      ctx.font='12px JetBrains Mono,monospace'; ctx.fillStyle='rgba(96,165,250,0.4)';
      ctx.fillText('∇²u = 0  ·  Re='+Math.floor(3000+Math.sin(t)*500),W*0.05,H-15);
    }
    else if(n===17){ // Reaction-diffusion — large
      if(!c._rd){const sz=80;c._rd={a:new Float32Array(sz*sz).fill(1),b:new Float32Array(sz*sz),sz};
        for(let i=28;i<52;i++)for(let j=28;j<52;j++){c._rd.b[i*sz+j]=1;}
      }
      const{a,b,sz}=c._rd,na=new Float32Array(sz*sz),nb=new Float32Array(sz*sz);
      const f=0.055,k=0.062;
      for(let i=1;i<sz-1;i++)for(let j=1;j<sz-1;j++){
        const idx=i*sz+j,lap_a=a[(i-1)*sz+j]+a[(i+1)*sz+j]+a[i*sz+j-1]+a[i*sz+j+1]-4*a[idx];
        const lap_b=b[(i-1)*sz+j]+b[(i+1)*sz+j]+b[i*sz+j-1]+b[i*sz+j+1]-4*b[idx];
        const abb=a[idx]*b[idx]*b[idx];
        na[idx]=Math.max(0,Math.min(1,a[idx]+lap_a*0.1-abb+f*(1-a[idx])));
        nb[idx]=Math.max(0,Math.min(1,b[idx]+lap_b*0.05+abb-(k+f)*b[idx]));
      }
      c._rd.a=na;c._rd.b=nb;
      const pw=W/sz,ph=H/sz;
      for(let i=0;i<sz;i++)for(let j=0;j<sz;j++){
        const v=Math.max(0,na[i*sz+j]-nb[i*sz+j]);
        ctx.fillStyle=`hsl(${25+v*50},${60+v*20}%,${15+v*45}%)`;ctx.fillRect(j*pw,i*ph,pw+1,ph+1);
      }
      ctx.font='12px JetBrains Mono,monospace'; ctx.fillStyle='rgba(232,130,12,0.5)';
      ctx.fillText('∂A/∂t = Dₐ∇²A − AB² + f(1−A)',W*0.05,H-15);
    }
    else if(n===20){ // Lorenz — large
      if(!c._lor){c._lor={x:1,y:1,z:1,pts:[]};}
      const{x,y,z}=c._lor,s=10,r=28,b2=8/3,dt=0.003;
      for(let i=0;i<5;i++){
        const dx=s*(c._lor.y-c._lor.x),dy=c._lor.x*(r-c._lor.z)-c._lor.y,dz=c._lor.x*c._lor.y-b2*c._lor.z;
        c._lor.x+=dx*dt;c._lor.y+=dy*dt;c._lor.z+=dz*dt;
        c._lor.pts.push({x:c._lor.x,y:c._lor.y,z:c._lor.z});
      }
      if(c._lor.pts.length>1200)c._lor.pts.shift();
      const rot=t*0.2;
      c._lor.pts.forEach((p,i)=>{
        const px=W/2+p.x*Math.cos(rot)*7-p.y*Math.sin(rot)*7;
        const py=H/2+(p.z-25)*5.5;
        ctx.fillStyle=`hsla(${200+i/12},80%,60%,${i/1200*0.8})`;ctx.fillRect(px,py,1.5,1.5);
      });
      ctx.font='12px JetBrains Mono,monospace'; ctx.fillStyle='rgba(96,165,250,0.4)';
      ctx.fillText('Lorenz Attractor  σ=10 ρ=28 β=8/3',W*0.05,H-15);
    }
    else if(n===35){ // Matrix Engineering Rain — full screen
      if(!c._mx){c._mx=Array.from({length:Math.floor(W/10)},()=>({y:Math.random()*H,speed:1.5+Math.random()*2.5,chars:['P&ID','ISO','API','CDM','WBS','P80','P6','CBA','FEED','HAZOP','NPV','CAPEX','OPEX','EPC','FEED','RAM','QRA','ALARP','BPVC','ATEX']}));}
      c._mx.forEach((col,i)=>{
        col.y+=col.speed; if(col.y>H+20)col.y=-20;
        const ch=col.chars[Math.floor(t*3+i*7)%col.chars.length];
        ctx.font='9px JetBrains Mono,monospace';
        ctx.fillStyle='rgba(232,130,12,1)'; ctx.fillText(ch.slice(0,4),i*10,col.y);
        ctx.fillStyle='rgba(232,130,12,0.35)'; ctx.fillText(col.chars[(Math.floor(t*3+i*7)+1)%col.chars.length].slice(0,4),i*10,col.y-18);
        ctx.fillStyle='rgba(232,130,12,0.12)'; ctx.fillText(col.chars[(Math.floor(t*3+i*7)+2)%col.chars.length].slice(0,4),i*10,col.y-36);
      });
    }
    else if(n===38){ // Wormhole — full
      for(let ring=30;ring>0;ring--){
        const dist=(ring/30+t*0.4)%1, r2=dist*Math.min(W,H)*0.9;
        const alpha=Math.pow(1-dist,1.5);
        ctx.strokeStyle=`rgba(96,165,250,${alpha*0.5})`; ctx.lineWidth=3*alpha;
        ctx.beginPath(); ctx.ellipse(W/2,H/2,r2,r2*0.45,0,0,Math.PI*2); ctx.stroke();
        if(ring%3===0){
          ctx.strokeStyle=`rgba(232,130,12,${alpha*0.3})`; ctx.lineWidth=1;
          ctx.beginPath(); ctx.ellipse(W/2,H/2,r2*0.7,r2*0.3,0,0,Math.PI*2); ctx.stroke();
        }
      }
      ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.beginPath(); ctx.arc(W/2,H/2,4,0,Math.PI*2); ctx.fill();
      ctx.font='14px JetBrains Mono,monospace'; ctx.fillStyle='rgba(96,165,250,0.4)';
      ctx.fillText('HYPERSPACE TRANSIT · '+Math.floor(t*100)+'LY',W/2-90,H-20);
    }
    else {
      // Default: category-themed scene
      const cat=IDEAS.find(i=>i.n===n)?.cat;
      const cols={ai:'rgba(196,181,253,',sim:'rgba(96,165,250,',gen:'rgba(232,130,12,',data:'rgba(110,231,183,',immerse:'rgba(251,191,36,'};
      const col=cols[cat]||'rgba(232,130,12,';
      // Animated particle field
      for(let i=0;i<60;i++){
        const px=W*((Math.sin(i*2.4+t*0.3)*0.5+0.5)*0.9+0.05);
        const py=H*((Math.cos(i*1.7+t*0.2)*0.5+0.5)*0.8+0.1);
        const sz=2+Math.sin(i+t)*1.5;
        ctx.fillStyle=col+(0.4+Math.sin(i+t)*0.2)+')';
        ctx.beginPath(); ctx.arc(px,py,sz,0,Math.PI*2); ctx.fill();
        if(i%4===0&&i>0){
          ctx.strokeStyle=col+0.1+')'; ctx.lineWidth=0.5;
          const px2=W*((Math.sin((i-4)*2.4+t*0.3)*0.5+0.5)*0.9+0.05);
          const py2=H*((Math.cos((i-4)*1.7+t*0.2)*0.5+0.5)*0.8+0.1);
          ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px2,py2); ctx.stroke();
        }
      }
      ctx.font='bold 32px Bebas Neue,sans-serif'; ctx.fillStyle=col+'0.15)';
      ctx.fillText(IDEAS.find(i=>i.n===n)?.title.toUpperCase()||'',W*0.05,H/2+10);
      ctx.font='11px JetBrains Mono,monospace'; ctx.fillStyle=col+'0.4)';
      ctx.fillText('INTERACTIVE PREVIEW AVAILABLE IN BUILT VERSION',W*0.05,H-15);
    }
  }
  mRaf=requestAnimationFrame(frame);
}
</script>
