<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>40 Jaw-Dropping Ideas — Vol. III · Saif Badawy Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07080e;--s1:#0d0e16;--s2:#13141f;--border:rgba(255,255,255,0.07);--accent:#E8820C;--a2:#F5A623;--white:#f0ede8;--muted:rgba(240,237,232,0.5);--bebas:'Bebas Neue',sans-serif;--mono:'JetBrains Mono',monospace;--sans:'DM Sans',sans-serif}
html,body{background:var(--bg);color:var(--white);font-family:var(--sans);min-height:100vh}
nav{position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:.8rem 2.4rem;background:rgba(7,8,14,.97);backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}
.logo{font-family:var(--bebas);font-size:1.25rem;letter-spacing:.22em;display:flex;align-items:center;gap:.5rem}
.logoDot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.badge{font-family:var(--mono);font-size:.46rem;letter-spacing:.2em;text-transform:uppercase;padding:.3rem .9rem;border:1px solid rgba(232,130,12,.4);color:var(--accent);background:rgba(232,130,12,.05)}
.page{max-width:1320px;margin:0 auto;padding:2.4rem 2rem 7rem}
.hdr{margin-bottom:2rem}
.hdrEye{display:flex;align-items:center;gap:.6rem;margin-bottom:.4rem}
.hdrLine{width:28px;height:1px;background:rgba(232,130,12,.4)}
.hdrTag{font-family:var(--mono);font-size:.48rem;letter-spacing:.22em;text-transform:uppercase;color:var(--accent)}
.hdrTitle{font-family:var(--bebas);font-size:clamp(2.4rem,4vw,3.2rem);letter-spacing:.04em;line-height:.94;margin-bottom:.5rem}
.hdrSub{font-family:var(--mono);font-size:.52rem;letter-spacing:.1em;color:var(--muted);line-height:1.7}
.filters{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:2rem}
.filt{font-family:var(--mono);font-size:.46rem;letter-spacing:.14em;text-transform:uppercase;padding:.32rem .85rem;border:1px solid var(--border);color:var(--muted);background:none;cursor:pointer;transition:all .15s}
.filt:hover,.filt.on{border-color:rgba(232,130,12,.5);color:var(--accent);background:rgba(232,130,12,.05)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:11px}
.card{background:var(--s1);border:1px solid var(--border);cursor:pointer;transition:border-color .2s,transform .15s,box-shadow .2s;overflow:hidden}
.card:hover{border-color:rgba(232,130,12,.4);transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,.5)}
.prev{width:100%;height:138px;overflow:hidden;position:relative;background:#02030a}
.card-foot{padding:9px 11px 11px}
.card-num{font-family:var(--mono);font-size:.4rem;letter-spacing:.16em;color:var(--accent);margin-bottom:2px}
.card-title{font-family:var(--bebas);font-size:.98rem;letter-spacing:.05em;line-height:1.1;margin-bottom:3px}
.card-sub{font-family:var(--mono);font-size:.4rem;letter-spacing:.08em;color:var(--muted);line-height:1.4}
.pill{display:inline-block;font-family:var(--mono);font-size:.36rem;letter-spacing:.12em;text-transform:uppercase;padding:.13rem .48rem;margin-bottom:4px}
.p-narr{background:rgba(251,191,36,.08);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}
.p-phys{background:rgba(96,165,250,.08);color:#60a5fa;border:1px solid rgba(96,165,250,.2)}
.p-gen{background:rgba(232,130,12,.08);color:#E8820C;border:1px solid rgba(232,130,12,.2)}
.p-sculpt{background:rgba(110,231,183,.08);color:#6ee7b7;border:1px solid rgba(110,231,183,.2)}
.p-tech{background:rgba(196,181,253,.08);color:#c4b5fd;border:1px solid rgba(196,181,253,.2)}
#modal{position:fixed;inset:0;z-index:500;background:rgba(3,4,10,.95);backdrop-filter:blur(20px);display:none;align-items:center;justify-content:center;padding:2rem}
#modal.open{display:flex}
#mbox{background:var(--s1);border:1px solid rgba(232,130,12,.22);width:100%;max-width:900px;max-height:90vh;overflow-y:auto;position:relative}
.mtop{background:rgba(232,130,12,.035);border-bottom:1px solid rgba(232,130,12,.13);padding:.65rem 1.2rem;display:flex;align-items:center;justify-content:space-between}
.mtop-l{font-family:var(--mono);font-size:.48rem;letter-spacing:.22em;text-transform:uppercase;color:var(--accent)}
.mclose{font-family:var(--mono);font-size:.52rem;letter-spacing:.1em;background:none;border:1px solid var(--border);color:var(--muted);padding:.28rem .65rem;cursor:pointer;transition:all .15s}
.mclose:hover{color:var(--accent);border-color:rgba(232,130,12,.4)}
#mscene{width:100%;min-height:400px;background:#02030a;overflow:hidden;position:relative}
#minfo{padding:1.3rem 1.5rem 1.5rem}
#minfo h2{font-family:var(--bebas);font-size:1.75rem;letter-spacing:.06em;margin-bottom:.45rem}
#minfo p{font-size:.87rem;line-height:1.82;color:var(--white);margin-bottom:1.1rem;max-width:680px}
.mbuild{font-family:var(--bebas);font-size:.88rem;letter-spacing:.16em;padding:.68rem 1.7rem;background:var(--accent);color:#07080e;border:none;cursor:pointer;transition:background .18s}
.mbuild:hover{background:var(--a2)}
</style>
</head>
<body>
<nav>
  <div class="logo"><div class="logoDot"></div>SAIF BADAWY</div>
  <div class="badge">VOL. III · 40 WOW-FACTOR IDEAS</div>
</nav>
<div class="page">
  <div class="hdr">
    <div class="hdrEye"><div class="hdrLine"></div><span class="hdrTag">Volume III — Never Done Before</span></div>
    <div class="hdrTitle">40 Ideas That Make<br>Anyone Say "Wow."</div>
    <div class="hdrSub">Narrative · Physics · Generative · Data Sculpture · Immersive Tech<br>Every idea built from Saif's real projects, roles, and content — click any card to preview</div>
  </div>
  <div class="filters">
    <button class="filt on" onclick="filt('all',this)">All 40</button>
    <button class="filt" onclick="filt('narr',this)">Narrative</button>
    <button class="filt" onclick="filt('phys',this)">Physics</button>
    <button class="filt" onclick="filt('gen',this)">Generative</button>
    <button class="filt" onclick="filt('sculpt',this)">Data Sculpture</button>
    <button class="filt" onclick="filt('tech',this)">Immersive Tech</button>
  </div>
  <div class="grid" id="grid"></div>
</div>
<div id="modal" onclick="if(event.target===this)closeModal()">
  <div id="mbox">
    <div class="mtop"><span class="mtop-l" id="mtopL">PREVIEW</span><button class="mclose" onclick="closeModal()">CLOSE ✕</button></div>
    <div id="mscene"></div>
    <div id="minfo"><h2 id="mtitle"></h2><p id="mdesc"></p><button class="mbuild" id="mbuild">BUILD THIS ON MY WEBSITE</button></div>
  </div>
</div>
<script>
const IDEAS=[
{n:1,cat:'narr',title:'Cinematic Career Reel',sub:'Portfolio opens like a Netflix title sequence',desc:'The page opens with a black screen and a dramatic sound-sync title card — "SAIF BADAWY · ENGINEERING PROJECT MANAGER". Then each section animates in like a film sequence: slow zoom, ken burns on project photos, subtitle captions. A portfolio that feels like a trailer for a person.',pill:'p-narr',label:'Narrative'},
{n:2,cat:'narr',title:'The Mission Briefing Board',sub:'CV as a spy mission board — red string & all',desc:'The hero is a corkboard with pinned documents, photographs, hand-drawn maps, and red string connecting projects to outcomes. Hover a pin to read the briefing. The whole CV becomes a mission dossier. Every project is an operation.',pill:'p-narr',label:'Narrative'},
{n:3,cat:'narr',title:'Career Time Scrubber',sub:'Drag a slider to travel through Saif\'s career',desc:'A horizontal timeline scrubber at the top of the page. Dragging left or right literally changes what year you\'re viewing — skills, job titles, projects, photo, and page colour all morph in real time. Watch a 10-year career in 10 seconds.',pill:'p-narr',label:'Narrative'},
{n:4,cat:'narr',title:'DNA Milestone Helix',sub:'Career milestones wound into a rotating double helix',desc:'Every project milestone, qualification, and role is a base pair on a rotating 3D DNA double helix. The two strands are "Technical Achievements" and "Leadership Milestones". Drag to rotate. Hover a base pair to see the milestone detail.',pill:'p-narr',label:'Narrative'},
{n:5,cat:'narr',title:'Breaking News Portfolio',sub:'Entire CV styled as a live news broadcast',desc:'The portfolio IS a live news channel. A ticker runs real project stats. A "Breaking News" banner appears as you scroll: "ENGINEER DELIVERS £340M NEOM PROJECT AHEAD OF SCHEDULE". Weather map replaced by a risk map. The full CV as broadcast journalism.',pill:'p-narr',label:'Narrative'},
{n:6,cat:'narr',title:'Morse Code Transmission',sub:'CV transmits across the screen as Morse code',desc:'A telegraph aesthetic: the entire CV encodes itself as animated Morse code dots and dashes across the hero, then decodes into readable text letter by letter. The audio-visual rhythm becomes hypnotic. A nod to engineering\'s communication heritage.',pill:'p-narr',label:'Narrative'},
{n:7,cat:'narr',title:'Classified Intelligence File',sub:'Redacted document that reveals on hover/click',desc:'The portfolio arrives looking like a declassified government file — heavy redaction bars over key facts. Hover any bar to lift the redaction and reveal the content beneath: project values, client names, technical details. The reveal is addictive.',pill:'p-narr',label:'Narrative'},
{n:8,cat:'narr',title:'Mission Control Dashboard',sub:'Career presented as a NASA control room',desc:'A full Mission Control aesthetic — multiple screen panels showing different "mission" data: comms log (work history), telemetry (skills), flight plan (education), crew manifest (teams led). Status lights, countdown timers. The engineer\'s career as a space programme.',pill:'p-narr',label:'Narrative'},
{n:9,cat:'phys',title:'Gravity Skill System',sub:'Skills orbit like planets with real gravitational physics',desc:'Skills are planetary bodies orbiting "Saif" at the centre. Larger skills have more mass and stronger orbits. Smaller adjacent skills get captured into binary pairs. The mouse creates a gravity well that warps trajectories. Real n-body simulation.',pill:'p-phys',label:'Physics'},
{n:10,cat:'phys',title:'Seismic Project Impact',sub:'Click a project — shockwaves radiate across the page',desc:'Click any project card and seismic P-waves and S-waves radiate outward across the page — the bigger the project, the bigger the quake. Richter scale appears in the corner. The £340M NEOM project registers 7.2. A visceral sense of scale.',pill:'p-phys',label:'Physics'},
{n:11,cat:'phys',title:'Mercury Budget Pools',sub:'Project budgets as liquid mercury that merges & splits',desc:'Project budgets are rendered as mercury pools at the bottom of the page — realistic surface tension, reflections, and viscosity. Hover to split a pool. Drag two together to merge budgets. The total budget counter updates with realistic fluid physics.',pill:'p-phys',label:'Physics'},
{n:12,cat:'phys',title:'Magnetic Cursor Field',sub:'Every element on the page responds to your mouse',desc:'The cursor emits a magnetic field. Text characters, cards, and icons drift toward or away from it based on their "polarity" — skills attract, risks repel. The whole page is alive with invisible forces. Move fast and watch the whole layout breathe.',pill:'p-phys',label:'Physics'},
{n:13,cat:'phys',title:'Entropy Reversal Scroll',sub:'Page starts as chaos — scroll creates order',desc:'On load the page appears as scattered, disorganised particles — CV text broken into floating atoms. As you scroll down, entropy reverses: particles snap into formation, text assembles, structure emerges. The act of reading the CV mirrors the engineer\'s job: bringing order to chaos.',pill:'p-phys',label:'Physics'},
{n:14,cat:'phys',title:'Tectonic Career Plates',sub:'Industry transitions as colliding tectonic plates',desc:'Career transitions are tectonic events. Plates labelled Oil & Gas, Infrastructure, Sustainability slowly drift and collide — mountain ranges (expertise) rise at collision zones. Subduction zones show where older skills descended into deeper capability. Geological metaphor as biography.',pill:'p-phys',label:'Physics'},
{n:15,cat:'phys',title:'Spring Network Cards',sub:'All section cards connected by visible springs',desc:'Every project card, skill badge, and section header is connected to adjacent elements by visible elastic springs. Drag any element and the entire connected graph oscillates with damped harmonic motion. The CV becomes a physical network you can pluck.',pill:'p-phys',label:'Physics'},
{n:16,cat:'phys',title:'Pendulum Clockwork Timeline',sub:'Career timeline driven by real pendulum mechanics',desc:'A giant clockwork mechanism where the main pendulum drives a timeline hand around a clock face. Each hour = one year of career. Cogs and escapements show the progress. The ticking rhythm is real pendulum physics — satisfying, precise, engineering-grade.',pill:'p-phys',label:'Physics'},
{n:17,cat:'gen',title:'Blueprint Self-Drawing',sub:'Technical drawing of Saif\'s profile draws itself',desc:'An engineering blueprint of a floor plan or P&ID draws itself from scratch — drafting lines appear, annotations are typed, dimension arrows extend. But the floor plan IS Saif\'s career path: each room a role, each corridor a transition. Watch the engineer\'s life drafted in real time.',pill:'p-gen',label:'Generative'},
{n:18,cat:'gen',title:'Project Data Fingerprints',sub:'Each project generates a unique radial biometric',desc:'Every project in the portfolio generates a unique visual fingerprint — a radial pattern computed from its budget, duration, team size, risk score, and outcome. No two are alike. The fingerprint is verifiably derived from the real project data. A biometric identity for each achievement.',pill:'p-gen',label:'Generative'},
{n:19,cat:'gen',title:'Topographic Skills Map',sub:'Expertise rendered as a 3D terrain: height = mastery',desc:'All skills are plotted on a 2D map and a 3D terrain is computed where height = proficiency. PM skills form the mountain range. Technical skills are foothills. Specialisms are peaks. Fly over it with the mouse. The skills landscape as geography.',pill:'p-gen',label:'Generative'},
{n:20,cat:'gen',title:'Career Coral Reef',sub:'Each role grows as a new coral species',desc:'The career timeline grows from seafloor upward as a coral reef. Each new role spawns a new coral species — shape and colour encoded from role type, duration, and industry. The reef is alive: it sways, fish swim through (team members), and light rays filter from above.',pill:'p-gen',label:'Generative'},
{n:21,cat:'gen',title:'Crystal Skill Formation',sub:'Skills crystallise from solution on page load',desc:'On load, the skills section is a supersaturated solution — formless. Then nucleation begins: first one crystal grows, then another, until the entire skills lattice has crystallised. Each crystal\'s shape is determined by the skill category. A chemistry metaphor for expertise.',pill:'p-gen',label:'Generative'},
{n:22,cat:'gen',title:'Procedural City Builder',sub:'Career timeline as a city being built in real time',desc:'A top-down city grid where each year of career is a new district being built — roads, buildings, and infrastructure procedurally placed. The city\'s density reflects career intensity. The skyline on the right becomes more complex over time. A SimCity of one man\'s career.',pill:'p-gen',label:'Generative'},
{n:23,cat:'gen',title:'Living Organisation Chart',sub:'Org chart breathes, reorganises, and pulses',desc:'The teams Saif has managed are rendered as a living org chart — it breathes in and out, periodically reorganises itself, and individual nodes pulse with activity based on their project contribution. Hover a node to see the person\'s brief story. Org charts have never been alive before.',pill:'p-gen',label:'Generative'},
{n:24,cat:'gen',title:'Erosion Scroll Reveal',sub:'Content is hidden under sediment — scroll erodes it',desc:'Each section starts covered in digital sediment — rock texture over content. Scrolling acts as water erosion: the sediment wears away at the scroll position, revealing the content beneath. Geological time compressed into a scroll gesture. Ancient and futuristic simultaneously.',pill:'p-gen',label:'Generative'},
{n:25,cat:'sculpt',title:'3D Career Spiral',sub:'Timeline spirals upward through 3D space',desc:'The career timeline is a 3D helix spiralling upward in WebGL. Each rotation = one year. Project markers glow at their coordinates. The helix rises from the seafloor (2015) to the stratosphere (2026). Drag to rotate the entire spiral. Depth creates a physical sense of time passing.',pill:'p-sculpt',label:'Data Sculpture'},
{n:26,cat:'sculpt',title:'Budget Mountain Range',sub:'Project budgets as a dramatic mountain silhouette',desc:'Every project\'s budget is a peak in an animated mountain range. £340M NEOM is Everest. Smaller projects are hills. The mountains scroll in parallax layers — fog in the valleys, sunrise colours. The fiscal landscape of an engineering career as physical geography.',pill:'p-sculpt',label:'Data Sculpture'},
{n:27,cat:'sculpt',title:'Heartbeat Career Monitor',sub:'Each project is a heartbeat event on a live ECG',desc:'A hospital ECG monitor shows Saif\'s career heart rate. Steady baseline during learning periods. Sharp QRS complexes at major project milestones. ST elevation during high-risk project phases. The career as a vital signs readout — the engineering heart is always beating.',pill:'p-sculpt',label:'Data Sculpture'},
{n:28,cat:'sculpt',title:'Risk Weather System',sub:'Project risks as live synoptic weather chart',desc:'A real synoptic weather map where each project is a weather system — pressure isobars show risk concentration, fronts show risk type (cost/schedule/safety), storm cells for critical risks. The map animates as the career progresses. Engineering risk as meteorology.',pill:'p-sculpt',label:'Data Sculpture'},
{n:29,cat:'sculpt',title:'Career Sankey River',sub:'Skills and methodologies flow through roles as a river',desc:'A Sankey diagram where input streams are education and early skills, tributaries merge into larger competency rivers, and the flow widens with each major role. The river branches into specialisms. See exactly how PM expertise flows from engineering foundations. A career hydrograph.',pill:'p-sculpt',label:'Data Sculpture'},
{n:30,cat:'sculpt',title:'Bubble Universe',sub:'Every project a soap bubble — size=value, colour=sector',desc:'A universe of soap bubbles, each one a project. Bubble size = project value. Colour = industry sector. Bubbles drift gently, occasionally merging. Hover to see project details appear inside the bubble\'s iridescent surface. Burst one to reveal the next project. Delicate and powerful.',pill:'p-sculpt',label:'Data Sculpture'},
{n:31,cat:'sculpt',title:'Sound Spectrum CV',sub:'Career data encoded as an audio waveform sculpture',desc:'The CV data is encoded as a visual audio waveform — each section a frequency band. Education is bass. Technical skills are mid. Soft skills are treble. The waveform is interactive: click any frequency band and that section scrolls into view. The CV as music.',pill:'p-sculpt',label:'Data Sculpture'},
{n:32,cat:'sculpt',title:'Project Constellation Map',sub:'Projects mapped as stars — connect the constellations',desc:'All 20+ projects are plotted as stars, their position determined by sector (x-axis) and impact (y-axis), brightness by complexity. As your mouse moves, proximity lines draw between related projects forming constellations: the "NEOM Cluster", the "Infrastructure Arm". The career as a star chart.',pill:'p-sculpt',label:'Data Sculpture'},
{n:33,cat:'tech',title:'"What Would Saif Build?" AI',sub:'Type your problem — get a bespoke project proposal',desc:'A text box at the bottom of the portfolio: "Describe your engineering challenge." Type anything. AI generates a structured project proposal in Saif\'s actual methodology: objectives, WBS, risk register, team, cost estimate. Real output, instantly. Turns a portfolio into a sales tool.',pill:'p-tech',label:'Immersive Tech'},
{n:34,cat:'tech',title:'Adaptive Industry Mode',sub:'Portfolio detects your industry and reframes itself',desc:'UTM parameters, referrer headers, or a simple self-select menu let the portfolio reframe all content for the visitor\'s world. Oil & gas visitor? Projects reframe to process safety and lifecycle. Construction? Same projects reframed to delivery and programme. One CV, infinite audiences.',pill:'p-tech',label:'Immersive Tech'},
{n:35,cat:'tech',title:'CV Compression Engine',sub:'Watch CV compress to 1 page → 1 para → 1 sentence → 1 word',desc:'An interactive compression visualiser. Start at the full CV. Press compress: it collapses to a one-pager. Press again: one paragraph. Again: one sentence. Again: one word. The word is "DELIVERS". Then it expands back. The essential core of the CV made visceral.',pill:'p-tech',label:'Immersive Tech'},
{n:36,cat:'tech',title:'Live Digital Twin Project',sub:'A fictional live project updating in real time',desc:'A permanent fixture on the portfolio: a fictional "Project Saif is currently managing" — a live dashboard showing stage (currently: Design Development), % complete (updating by the second), today\'s risk register item, latest milestone. It\'s fake but looks 100% real. The always-on engineer.',pill:'p-tech',label:'Immersive Tech'},
{n:37,cat:'tech',title:'Reverse Interview Mode',sub:'The portfolio interviews the recruiter instead',desc:'A mode where the portfolio turns the tables: it asks the recruiter questions about their project. "What\'s your biggest delivery risk?" "How mature is your PMO?" Based on answers, it tells the recruiter why Saif is exactly what they need. The portfolio as a consultant.',pill:'p-tech',label:'Immersive Tech'},
{n:38,cat:'tech',title:'Global Visitor Constellation',sub:'See where in the world every visitor came from',desc:'A globe at the bottom of the portfolio with glowing dots where every visitor has come from. Real data, privacy-safe (city-level only). As new visitors arrive, their dot pulses into existence. The portfolio\'s reach, made visible. Recruiters in London, Dubai, Riyadh, Houston.',pill:'p-tech',label:'Immersive Tech'},
{n:39,cat:'tech',title:'The Hidden Last Page',sub:'Scroll past the footer — find something unexpected',desc:'Scroll past the last footer element and the page continues: a completely different aesthetic — dark matter, floating equations, a handwritten note from Saif, a secret contact form that bypasses the main one. Only people curious enough to scroll further than expected find it.',pill:'p-tech',label:'Immersive Tech'},
{n:40,cat:'tech',title:'Portfolio Stress Test',sub:'Apply engineering loads to the page itself',desc:'A toolbar appears with load controls: "Apply thermal load", "Apply seismic force", "Apply wind pressure". Click them and the page itself deforms — text bends under load, sections bow, colour temperature shifts with heat. Then click "Remove load" and everything springs back. Meta engineering.',pill:'p-tech',label:'Immersive Tech'},
];

function filt(cat,el){
  document.querySelectorAll('.filt').forEach(b=>b.classList.remove('on'));el.classList.add('on');
  document.querySelectorAll('.card').forEach(c=>{c.style.display=(cat==='all'||c.dataset.cat===cat)?'':'none';});
}
function buildGrid(){
  const g=document.getElementById('grid');
  IDEAS.forEach(id=>{
    const d=document.createElement('div');d.className='card';d.dataset.cat=id.cat;d.onclick=()=>openModal(id.n);
    d.innerHTML=`<div class="prev" id="p${id.n}"></div><div class="card-foot"><span class="pill ${id.pill}">${id.label}</span><div class="card-num">${String(id.n).padStart(2,'0')}</div><div class="card-title">${id.title}</div><div class="card-sub">${id.sub}</div></div>`;
    g.appendChild(d);
  });
}
buildGrid();

let mRaf=null;
function openModal(n){
  const idea=IDEAS.find(i=>i.n===n);
  document.getElementById('mtopL').textContent=`IDEA ${String(n).padStart(2,'0')} · ${idea.label.toUpperCase()}`;
  document.getElementById('mtitle').textContent=idea.title;
  document.getElementById('mdesc').textContent=idea.desc;
  document.getElementById('mbuild').onclick=()=>{if(window.sendPrompt)window.sendPrompt(`Build idea from Vol3 #${n}: ${idea.title} on my portfolio website`);};
  const sc=document.getElementById('mscene');sc.innerHTML='';
  if(mRaf){cancelAnimationFrame(mRaf);mRaf=null;}
  buildModal(n,sc);
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');if(mRaf){cancelAnimationFrame(mRaf);mRaf=null;}}

// ══════════════════════════════════════════════════
// THUMBNAIL RENDERERS
// ══════════════════════════════════════════════════
function drawThumb(n,el){
  const c=document.createElement('canvas');
  const W=el.offsetWidth||215,H=138;
  c.width=W;c.height=H;c.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%';
  el.style.position='relative';el.appendChild(c);
  const ctx=c.getContext('2d');
  let t=0;
  const A='#E8820C',BG='#02030a';

  function loop(){
    requestAnimationFrame(loop);t+=0.016;
    ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);

    if(n===1){ // Cinematic reel — film grain + title card
      // Film grain
      for(let i=0;i<200;i++){ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.04})`;ctx.fillRect(Math.random()*W,Math.random()*H,1,1);}
      // Letterbox bars
      ctx.fillStyle='#000';ctx.fillRect(0,0,W,18);ctx.fillRect(0,H-18,W,18);
      // Cinematic title
      ctx.font='bold 14px Bebas Neue,sans-serif';
      const fade=0.6+Math.sin(t*0.5)*0.3;
      ctx.fillStyle=`rgba(240,237,232,${fade})`;
      ctx.fillText('SAIF BADAWY',W/2-38,H/2+5);
      ctx.font='5px JetBrains Mono,monospace';ctx.fillStyle=`rgba(232,130,12,${fade*0.8})`;
      ctx.fillText('ENGINEERING PROJECT MANAGER',W/2-46,H/2+18);
      // Scan line
      const sl=(t*40)%H;ctx.fillStyle='rgba(255,255,255,0.04)';ctx.fillRect(0,sl,W,1);
    }
    else if(n===2){ // Mission board — corkboard + pins
      // Cork texture
      ctx.fillStyle='#2a1a0a';ctx.fillRect(0,0,W,H);

      ctx.font='5px JetBrains Mono,monospace';ctx.fillStyle='rgba(251,191,36,0.4)';ctx.fillText('SAIF IS ASKING YOU.',14,H-8);
      // Arrow pointing at viewer
      ctx.strokeStyle=`rgba(251,191,36,${fade*0.6})`;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(W/2,H*0.7);ctx.lineTo(W/2,H*0.85);ctx.stroke();
      ctx.beginPath();ctx.moveTo(W/2-6,H*0.8);ctx.lineTo(W/2,H*0.88);ctx.lineTo(W/2+6,H*0.8);ctx.stroke();
    }
    else if(n===38){ // Globe visitor map
      const cx=W/2,cy=H/2,r=38;
      ctx.strokeStyle='rgba(96,165,250,0.2)';ctx.lineWidth=0.5;
      // Globe grid
      for(let lat=-60;lat<=60;lat+=30){const ry=r*Math.cos(lat*Math.PI/180);const cy2=cy+r*Math.sin(lat*Math.PI/180);ctx.beginPath();ctx.ellipse(cx,cy2,ry*Math.abs(Math.cos(lat*Math.PI/180*0.5)),ry*0.15,0,0,Math.PI*2);ctx.stroke();}
      for(let lon=0;lon<360;lon+=30){ctx.beginPath();ctx.ellipse(cx,cy,r*Math.abs(Math.cos((lon+t*20)*Math.PI/180))*0.3+1,r,0,0,Math.PI*2);ctx.stroke();}
      // Visitor dots
      const dots=[{x:cx+15,y:cy-12},{x:cx-18,y:cy+5},{x:cx+5,y:cy+18},{x:cx-5,y:cy-18},{x:cx+22,y:cy+8}];
      dots.forEach((d,i)=>{
        const pulse=(t*2+i)%3;
        ctx.fillStyle=A;ctx.beginPath();ctx.arc(d.x,d.y,1.5,0,Math.PI*2);ctx.fill();
        if(pulse<1){ctx.strokeStyle=`rgba(232,130,12,${1-pulse})`;ctx.lineWidth=0.8;ctx.beginPath();ctx.arc(d.x,d.y,pulse*8,0,Math.PI*2);ctx.stroke();}
      });
    }
    else if(n===39){ // Hidden last page
      ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
      for(let i=0;i<100;i++){ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.15})`;ctx.fillRect(Math.random()*W,Math.random()*H,Math.random()<0.9?1:2,1);}
      const a=0.5+Math.sin(t*0.5)*0.4;
      ctx.font='8px JetBrains Mono,monospace';ctx.fillStyle=`rgba(232,130,12,${a})`;ctx.fillText('↓ KEEP SCROLLING ↓',W/2-50,H/2);
      ctx.font='5px JetBrains Mono,monospace';ctx.fillStyle=`rgba(255,255,255,${a*0.5})`;ctx.fillText('something\'s down here...',W/2-44,H/2+16);
      // Footer blur
      ctx.fillStyle='rgba(232,130,12,0.04)';ctx.fillRect(0,H-30,W,30);
    }
    else if(n===40){ // Portfolio stress test
      ctx.fillStyle='#07080e';ctx.fillRect(0,0,W,H);
      // Page content bending
      const load=Math.sin(t*0.5)*0.5+0.5;
      const deform=load*15;
      ctx.save();
      ctx.transform(1,0,Math.sin(t*0.3)*0.03,1+load*0.02,0,deform*0.5);
      ctx.font='bold 11px Bebas Neue,sans-serif';ctx.fillStyle='rgba(240,237,232,0.7)';
      ctx.fillText('SAIF BADAWY · PM',14,30);
      for(let i=0;i<4;i++){ctx.fillStyle='rgba(240,237,232,0.12)';ctx.fillRect(14,45+i*18,W-60,(i===0?8:5));}
      ctx.restore();
      // Load arrow + heat
      ctx.fillStyle=`rgba(255,${Math.floor(100-load*80)},0,${load*0.6})`;ctx.fillRect(0,0,W,H);
      ctx.strokeStyle='rgba(255,80,0,0.8)';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(W/2,5);ctx.lineTo(W/2,25+deform);ctx.stroke();
      ctx.font='5px JetBrains Mono,monospace';ctx.fillStyle='rgba(255,150,0,0.7)';
      ctx.fillText('LOAD: '+(load*100).toFixed(0)+'kN/m²',8,H-8);
    }
    else{
      ctx.fillStyle='rgba(232,130,12,0.3)';
      for(let i=0;i<40;i++){ctx.beginPath();ctx.arc(Math.random()*W,Math.random()*H,2,0,Math.PI*2);ctx.fill();}
    }
  }
  requestAnimationFrame(loop);
}

setTimeout(()=>{IDEAS.forEach(id=>{const el=document.getElementById('p'+id.n);if(el)drawThumb(id.n,el);});},120);

// ═══════════════════════════════════════════════════
// MODAL BUILDERS
// ═══════════════════════════════════════════════════
function buildModal(n,sc){
  const W=sc.offsetWidth||900,H=420;
  const c=document.createElement('canvas');
  c.width=W;c.height=H;c.style.cssText='width:100%;height:420px;display:block';
  sc.appendChild(c);
  const ctx=c.getContext('2d');
  const A='#E8820C';let t=0;

  function frame(){
    mRaf=requestAnimationFrame(frame);t+=0.012;
    ctx.fillStyle='#02030a';ctx.fillRect(0,0,W,H);

    if(n===1){ // Cinematic — full letterbox
      for(let i=0;i<500;i++){ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.025})`;ctx.fillRect(Math.random()*W,Math.random()*H,1,1);}
      ctx.fillStyle='#000';ctx.fillRect(0,0,W,50);ctx.fillRect(0,H-50,W,50);
      const fade=0.7+Math.sin(t*0.4)*0.25;
      ctx.font='bold 64px Bebas Neue,sans-serif';ctx.fillStyle=`rgba(240,237,232,${fade})`;
      ctx.fillText('SAIF BADAWY',W/2-180,H/2+18);
      ctx.font='16px JetBrains Mono,monospace';ctx.fillStyle=`rgba(232,130,12,${fade})`;
      ctx.fillText('ENGINEERING PROJECT MANAGER · 2015 — PRESENT',W/2-230,H/2+46);
      const sl=(t*50)%H;ctx.fillStyle='rgba(255,255,255,0.02)';ctx.fillRect(0,sl,W,2);
    }
    else if(n===5){ // Breaking news full
      ctx.fillStyle='#08080f';ctx.fillRect(0,0,W,H);
      ctx.fillStyle=A;ctx.fillRect(0,0,W,55);
      ctx.font='bold 28px Bebas Neue,sans-serif';ctx.fillStyle='#000';ctx.fillText('● SAIF BADAWY ENGINEERING NETWORK  LIVE',16,38);
      ctx.fillStyle='rgba(220,30,30,0.95)';ctx.fillRect(0,H-45,W,45);
      ctx.font='bold 14px Bebas Neue,sans-serif';ctx.fillStyle='#fff';ctx.fillText('⬡ BREAKING:',10,H-18);
      const ticker='£340M NEOM PROJECT DELIVERED AHEAD OF SCHEDULE  ·  SUSTAINABILITY TARGETS EXCEEDED BY 12%  ·  14 SUBCONTRACTORS MANAGED  ·  ZERO LOST TIME INCIDENTS  ·  ';
      const tx=W-(t*80%(ticker.length*7.5+W));
      ctx.font='13px JetBrains Mono,monospace';ctx.fillStyle='rgba(255,255,255,0.9)';ctx.save();ctx.rect(90,H-40,W-90,30);ctx.clip();ctx.fillText(ticker,tx+90,H-18);ctx.restore();
      // Body panels
      const panels=[{x:20,y:70,w:W*0.55,h:H-140,t:'INFRASTRUCTURE ENGINEER\nCONFIRMS THIRD CONSECUTIVE\nPROJECT DELIVERED\nAHEAD OF SCHEDULE',c:'rgba(255,255,255,0.8)'},{x:W*0.58,y:70,w:W*0.4,h:H-140,t:'PROJECT VALUE:\n£340,000,000\n\nTEAM SIZE: 14\nSUBCONTRACTORS\n\nRATING: ★★★★★'}];
      panels.forEach(p=>{ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=0.5;ctx.strokeRect(p.x,p.y,p.w,p.h);ctx.font='18px Bebas Neue,sans-serif';ctx.fillStyle=p.c;p.t.split('\n').forEach((l,i)=>ctx.fillText(l,p.x+10,p.y+26+i*22));});
    }
    else if(n===10){ // Seismic — large map
      if(!c._q2){c._q2={waves:[],t:0,projects:[{x:W*0.35,y:H*0.45,m:340,n:'NEOM',c:'#E8820C'},{x:W*0.65,y:H*0.3,m:28,n:'CROSSRAIL',c:'#60a5fa'},{x:W*0.2,y:H*0.65,m:22,n:'NORTH SEA',c:'#6ee7b7'}]};}
      c._q2.t+=0.012;
      c._q2.projects.forEach(p=>{
        const phase=(c._q2.t*0.5+p.x*0.001)%3;
        for(let ring=1;ring<8;ring++){
          const r=ring*30*phase,alpha=Math.max(0,0.6-ring*0.08-phase*0.2);
          ctx.strokeStyle=p.c+Math.floor(alpha*255).toString(16).padStart(2,'0');
          ctx.lineWidth=ring===1?2:0.8;
          ctx.beginPath();ctx.ellipse(p.x,p.y,r,r*0.6,0,0,Math.PI*2);ctx.stroke();
        }
        ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);ctx.fill();
        ctx.font='11px JetBrains Mono,monospace';ctx.fillStyle='rgba(255,255,255,0.7)';ctx.fillText(p.n+' £'+p.m+'M',p.x+8,p.y-6);
        const richter=(Math.log(p.m/5)/Math.log(10)*2+4).toFixed(1);
        ctx.font='9px JetBrains Mono,monospace';ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fillText('M'+richter,p.x+8,p.y+8);
      });
      ctx.font='11px JetBrains Mono,monospace';ctx.fillStyle='rgba(232,130,12,0.3)';ctx.fillText('PROJECT IMPACT SEISMOGRAPH · RICHTER EQUIVALENT',W*0.05,H-15);
    }
    else if(n===13){ // Entropy reversal — large
      const order=Math.min(1,(t*0.15)%1);
      const text='SAIF BADAWY · ENGINEERING PROJECT MANAGER · £340M DELIVERED · ZERO INCIDENTS · 14 TEAMS · 5 COUNTRIES';
      ctx.font='13px JetBrains Mono,monospace';
      text.split('').forEach((ch,i)=>{
        const cols=Math.floor(W/8),row=Math.floor(i/cols),col=i%cols;
        const tx=16+col*8,ty=50+row*18;
        const ox=tx+(1-order)*(Math.sin(i*2.1+1)*150);
        const oy=ty+(1-order)*(Math.cos(i*1.5+0.5)*100);
        ctx.fillStyle=`rgba(232,130,12,${0.3+order*0.65})`;ctx.fillText(ch,ox,oy);
      });
      ctx.font='11px JetBrains Mono,monospace';ctx.fillStyle='rgba(232,130,12,0.25)';
      ctx.fillText('ENTROPY: '+((1-order)*100).toFixed(0)+'%  ·  ORDER: '+(order*100).toFixed(0)+'%',W*0.05,H-15);
    }
    else if(n===27){ // ECG — big monitor
      ctx.fillStyle='#000';ctx.fillRect(20,20,W-40,H-40);
      ctx.strokeStyle='rgba(0,200,80,0.2)';ctx.lineWidth=0.4;
      for(let x=20;x<W-20;x+=20){ctx.beginPath();ctx.moveTo(x,20);ctx.lineTo(x,H-20);ctx.stroke();}
      for(let y=20;y<H-20;y+=16){ctx.beginPath();ctx.moveTo(20,y);ctx.lineTo(W-20,y);ctx.stroke();}
      if(!c._ecg2)c._ecg2={pts:[],t:0};
      for(let step=0;step<3;step++){
        c._ecg2.t+=0.016;
        const x=20+(((c._ecg2.t*55)%(W-40)));
        const qrs=(c._ecg2.t%2.5)-0.5;
        let y=H/2;
        if(qrs>-0.06&&qrs<0)y+=qrs*250;
        else if(qrs>=0&&qrs<0.06)y+=qrs*900-80;
        else if(qrs>=0.06&&qrs<0.12)y+=qrs*-550+100;
        else if(qrs>=0.12&&qrs<0.3)y+=Math.sin((qrs-0.12)*20)*8;
        else y+=Math.sin(qrs*15)*2;
        c._ecg2.pts.push({x,y});if(c._ecg2.pts.length>200)c._ecg2.pts.shift();
      }
      ctx.strokeStyle='rgba(0,255,80,0.95)';ctx.lineWidth=2;ctx.beginPath();
      c._ecg2.pts.forEach((p,i)=>{i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);});ctx.stroke();
      ctx.font='14px JetBrains Mono,monospace';ctx.fillStyle='rgba(0,255,80,0.6)';
      ctx.fillText('HR: 60 bpm',30,H-30);ctx.fillText('CAREER: OPERATIONAL',W/2-70,H-30);
      const major=[{t:'NEOM',x:W*0.2},{t:'INFRA',x:W*0.45},{t:'SUSTbility',x:W*0.72}];
      major.forEach(m=>{ctx.strokeStyle='rgba(232,130,12,0.3)';ctx.lineWidth=0.8;ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(m.x,30);ctx.lineTo(m.x,H-30);ctx.stroke();ctx.setLineDash([]);ctx.font='9px JetBrains Mono,monospace';ctx.fillStyle='rgba(232,130,12,0.5)';ctx.fillText(m.t,m.x-18,45);});
    }
    else if(n===35){ // Compression — animated
      const stages=[{label:'FULL CV',lines:24,fade:1},{label:'ONE PAGE',lines:10,fade:1},{label:'ONE PARAGRAPH',lines:4,fade:1},{label:'ONE SENTENCE',lines:1,fade:1},{label:'ONE WORD',lines:0,fade:1,word:'DELIVERS'}];
      const si=Math.floor(t*0.5)%stages.length;
      const stage=stages[si];
      const blend=Math.min(1,(t*0.5%1)*4);
      ctx.font='11px JetBrains Mono,monospace';ctx.fillStyle=`rgba(232,130,12,${blend*0.6})`;
      ctx.fillText('→ '+stage.label,W/2-60,60);
      if(stage.word){
        ctx.font='bold 80px Bebas Neue,sans-serif';ctx.fillStyle=`rgba(232,130,12,${blend})`;
        ctx.fillText(stage.word,W/2-110,H/2+28);
      } else {
        for(let i=0;i<stage.lines;i++){
          const lw=(W-120)*(i===0?0.9:0.6+Math.random()*0.35);
          ctx.fillStyle=`rgba(240,237,232,${blend*0.2})`;ctx.fillRect(60,80+i*(H-100)/Math.max(stage.lines,1),lw,i===0?14:9);
        }
      }
      ctx.fillStyle='rgba(232,130,12,0.2)';ctx.font='10px JetBrains Mono,monospace';ctx.fillText('COMPRESSION '+((si+1)*20)+'%',W/2-44,H-20);
    }
    else if(n===40){ // Stress test full
      const load=(Math.sin(t*0.4)+1)/2;
      const heat=`rgba(255,${Math.floor(80-load*60)},0,${load*0.12})`;
      ctx.fillStyle=heat;ctx.fillRect(0,0,W,H);
      // Deforming page elements
      const deform=load*22,shear=Math.sin(t*0.3)*load*0.04;
      ctx.save();ctx.transform(1,shear,0,1+load*0.015,0,deform/2);
      ['SAIF BADAWY · ENGINEERING PROJECT MANAGER','━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━','NEOM PROGRAMME  ·  £340M  ·  2023—2025','CROSSRAIL SYSTEMS  ·  £28M  ·  2021—2022','NORTH SEA UPGRADE  ·  £22M  ·  2019—2020','',`CURRENT LOAD: ${(load*100).toFixed(0)}kN/m²  TEMP: ${(20+load*180).toFixed(0)}°C`].forEach((l,i)=>{
        ctx.font=i===0?'bold 18px Bebas Neue,sans-serif':'12px JetBrains Mono,monospace';
        ctx.fillStyle=i===6?`rgba(255,${Math.floor(150-load*100)},50,0.8)`:'rgba(240,237,232,0.75)';
        ctx.fillText(l,W*0.05,60+i*40);
      });
      ctx.restore();
      // Load arrows
      for(let x=W*0.1;x<W*0.9;x+=80){
        ctx.strokeStyle=`rgba(255,100,0,${load*0.7})`;ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(x,10);ctx.lineTo(x,30+deform/2);ctx.stroke();
        ctx.fillStyle=`rgba(255,100,0,${load*0.7})`;
        ctx.beginPath();ctx.moveTo(x-5,25+deform/2);ctx.lineTo(x,35+deform/2);ctx.lineTo(x+5,25+deform/2);ctx.fill();
      }
      ctx.font='11px JetBrains Mono,monospace';ctx.fillStyle=`rgba(255,${Math.floor(150-load*100)},50,0.6)`;
      ctx.fillText('APPLYING '+['THERMAL','SEISMIC','WIND PRESSURE'][Math.floor(t*0.3)%3]+' LOAD · STRUCTURAL RESPONSE LIVE',W*0.05,H-15);
    }
    else {
      // Category-themed default scene
      const cat=IDEAS.find(i=>i.n===n)?.cat;
      const cols={narr:'rgba(251,191,36,',phys:'rgba(96,165,250,',gen:'rgba(232,130,12,',sculpt:'rgba(110,231,183,',tech:'rgba(196,181,253,'};
      const col=cols[cat]||'rgba(232,130,12,';
      for(let i=0;i<80;i++){
        const px=W*((Math.sin(i*2.1+t*0.25)*0.5+0.5)*0.88+0.06);
        const py=H*((Math.cos(i*1.6+t*0.18)*0.5+0.5)*0.78+0.1);
        const sz=2.5+Math.sin(i+t*1.5)*2;
        ctx.fillStyle=col+(0.35+Math.sin(i*0.8+t)*0.2)+')';
        ctx.beginPath();ctx.arc(px,py,sz,0,Math.PI*2);ctx.fill();
        if(i%5===0&&i>0){ctx.strokeStyle=col+0.08+')';ctx.lineWidth=0.6;const px2=W*((Math.sin((i-5)*2.1+t*0.25)*0.5+0.5)*0.88+0.06),py2=H*((Math.cos((i-5)*1.6+t*0.18)*0.5+0.5)*0.78+0.1);ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px2,py2);ctx.stroke();}
      }
      ctx.font='bold 38px Bebas Neue,sans-serif';ctx.fillStyle=col+'0.1)';
      ctx.fillText((IDEAS.find(i=>i.n===n)?.title||'').toUpperCase(),W*0.05,H/2+12);
      ctx.font='11px JetBrains Mono,monospace';ctx.fillStyle=col+'0.35)';
      ctx.fillText('FULL INTERACTIVE VERSION IN BUILT IMPLEMENTATION',W*0.05,H-18);
    }
  }
  mRaf=requestAnimationFrame(frame);
}
