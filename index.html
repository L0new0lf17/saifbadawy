<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saif Badawy — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #070707;
      --white:  #f0ede8;
      --accent: #E8820C;
      --muted:  rgba(240,237,232,0.35);
      --border: rgba(240,237,232,0.08);
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Ambient glow */
    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      opacity: 0.12;
    }
    .glow1 { width: 600px; height: 600px; background: var(--accent); top: -15%; left: -10%; animation: drift1 20s ease-in-out infinite; }
    .glow2 { width: 400px; height: 400px; background: #F5A623;       bottom: -10%; right: -8%;  animation: drift2 26s ease-in-out infinite; }
    @keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(60px,40px)} }
    @keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-50px,60px)} }

    /* Scan line overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
      pointer-events: none;
    }

    .wrap {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }

    .eyebrow {
      font-size: .55rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .75rem;
    }
    .eyebrow::before, .eyebrow::after {
      content: '';
      width: 32px;
      height: 1px;
      background: rgba(232,130,12,.4);
    }

    .name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4rem, 12vw, 9rem);
      letter-spacing: .04em;
      line-height: .9;
      margin-bottom: 2rem;
    }
    .name span { color: var(--accent); }

    .tagline {
      font-size: .7rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3rem;
      line-height: 2;
    }

    .divider {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, transparent, var(--accent), transparent);
      margin: 0 auto 3rem;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }

    .status {
      display: inline-flex;
      align-items: center;
      gap: .6rem;
      font-size: .55rem;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: .6rem 1.2rem;
      margin-bottom: 2.5rem;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1.8s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    .contact {
      font-size: .58rem;
      letter-spacing: .1em;
      color: var(--muted);
    }
    .contact a {
      color: var(--white);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      padding-bottom: .1rem;
      transition: color .2s, border-color .2s;
    }
    .contact a:hover { color: var(--accent); border-color: var(--accent); }

    @media (max-width: 480px) {
      .name { font-size: clamp(3.5rem, 16vw, 5rem); }
    }
  </style>
</head>
<body>

  <div class="glow glow1"></div>
  <div class="glow glow2"></div>

  <div class="wrap">
    <div class="eyebrow">Portfolio</div>

    <div class="name">
      SAIF<br><span>BADAWY</span>
    </div>

    <div class="tagline">
      Project Engineer &amp; Consultant<br>
      London, England
    </div>

    <div class="divider"></div>

    <div class="status">
      <div class="dot"></div>
      Something new is coming
    </div>

    <div class="contact">
      In the meantime —&nbsp;
      <a href="mailto:saifehabbadawy@gmail.com">get in touch</a>
    </div>
  </div>

</body>
</html>
